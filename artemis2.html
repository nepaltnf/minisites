<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis II — Window View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* Window frame overlay */
    #window-frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.85) 100%);
      border: 18px solid #1a1a1a;
      border-radius: 48px;
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.9),
        inset 0 0 8px rgba(255,255,255,0.04),
        0 0 0 4px #111;
    }

    /* HUD */
    #hud {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 40px;
      align-items: flex-end;
    }

    .hud-block {
      text-align: center;
      opacity: 0.7;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.05em;
    }

    #hud-date {
      font-size: 10px;
      color: #666;
      letter-spacing: 0.15em;
    }

    /* Zoom hint */
    #zoom-hint {
      position: fixed;
      top: 36px;
      right: 44px;
      z-index: 20;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #444;
      text-transform: uppercase;
    }

    /* VR button */
    #vr-btn {
      position: fixed;
      top: 36px;
      left: 44px;
      z-index: 20;
      background: none;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    #vr-btn:hover { border-color: #888; color: #ccc; }
    #vr-btn.hidden { display: none; }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      gap: 16px;
    }
    #loading-title {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
    }
    #loading-status {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #333;
    }

    /* Mission phase / title */
    #met {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
    }
    #met-title {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #333;
      text-transform: uppercase;
    }
    #met-phase {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #2a4a2a;
      text-transform: uppercase;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-title">Artemis II</div>
  <div id="loading-status">Loading textures...</div>
</div>

<div id="canvas-container"></div>
<div id="window-frame"></div>

<div id="met">
  <div id="met-title">Artemis II — Window View</div>
  <div id="met-phase">—</div>
</div>
<div id="zoom-hint">Scroll to zoom</div>

<button id="vr-btn" class="hidden">Enter VR</button>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Distance to Earth</div>
    <div class="hud-value" id="dist-earth">—</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Velocity</div>
    <div class="hud-value" id="velocity">—</div>
    <div id="hud-date">—</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Distance to Moon</div>
    <div class="hud-value" id="dist-moon">—</div>
  </div>
</div>

<!-- Three.js r158 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────

const EARTH_RADIUS_KM  = 6371;
const MOON_RADIUS_KM   = 1737;
const SCENE_SCALE      = 1 / 10000; // 1 scene unit = 10,000 km
const FOV_DEFAULT      = 65;
const FOV_MIN          = 5;
const FOV_MAX          = 90;
const ZOOM_SPEED       = 0.08;

// Textures from CORS-friendly CDNs
const TEXTURES = {
  earthDay:   'https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg',
  earthCloud: null, // generated procedurally below
  moon:       'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg',
};

// ─── LIVE TELEMETRY ──────────────────────────────────────────────────────────
// Source: launchwatch.modelotech.com — proxies NASA AROW telemetry

const BASE_TELEMETRY_URL = 'https://launchwatch.modelotech.com/api/artemis2/status';

const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${url}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

async function fetchArtemisStatus() {
  // Try direct first (works when deployed to same-origin or if server allows CORS)
  try {
    const res = await fetch(BASE_TELEMETRY_URL);
    if (res.ok) return res.json();
  } catch (_) {}

  // Fall through proxy chain
  for (const makeUrl of CORS_PROXIES) {
    try {
      const res = await fetch(makeUrl(BASE_TELEMETRY_URL));
      if (res.ok) return res.json();
    } catch (_) {}
  }

  throw new Error('All telemetry sources failed');
}

// Convert geocentric lat/lon + radius to Cartesian (Y-up)
function geocentricToXYZ(latDeg, lonDeg, radiusKm) {
  const lat = latDeg * Math.PI / 180;
  const lon = lonDeg * Math.PI / 180;
  return {
    x:  radiusKm * Math.cos(lat) * Math.cos(lon),
    y:  radiusKm * Math.sin(lat),
    z:  radiusKm * Math.cos(lat) * Math.sin(lon),
  };
}

// Approximate Moon position relative to Earth (geocentric equatorial, km)
// Good to ~1° — enough for visual placement
function approxMoonPos(date) {
  const D = (date - new Date('2000-01-01T12:00:00Z')) / 86400000; // days from J2000
  const L = (218.316 + 13.176396 * D) * Math.PI / 180;
  const M = (134.963 + 13.064993 * D) * Math.PI / 180;
  const F = (93.272  + 13.229350 * D) * Math.PI / 180;
  const lon = L + 6.289 * Math.sin(M) * Math.PI / 180;
  const lat = 5.128 * Math.sin(F) * Math.PI / 180;
  const r   = 385001 - 20905 * Math.cos(M); // km
  // Convert ecliptic to equatorial (obliquity ~23.44°)
  const eps = 23.44 * Math.PI / 180;
  return {
    x: r * Math.cos(lat) * Math.cos(lon),
    y: r * (Math.cos(eps) * Math.cos(lat) * Math.sin(lon) - Math.sin(eps) * Math.sin(lat)),
    z: r * (Math.sin(eps) * Math.cos(lat) * Math.sin(lon) + Math.cos(eps) * Math.sin(lat)),
  };
}

// Approximate Sun direction from Earth (for lighting)
function approxSunDirection(date) {
  const D = (date - new Date('2000-01-01T12:00:00Z')) / 86400000;
  const L = (280.46 + 0.9856474 * D) * Math.PI / 180;
  const g = (357.528 + 0.9856003 * D) * Math.PI / 180;
  const lon = L + 1.915 * Math.sin(g) * Math.PI / 180 + 0.020 * Math.sin(2 * g) * Math.PI / 180;
  const eps = 23.44 * Math.PI / 180;
  return new THREE.Vector3(
    Math.cos(lon),
    Math.sin(eps) * Math.sin(lon),
    -Math.cos(eps) * Math.sin(lon)
  ).normalize();
}

// ─── SCENE ────────────────────────────────────────────────────────────────────

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(FOV_DEFAULT, innerWidth / innerHeight, 0.0001, 1e8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────

// Sun — very bright, directional (Sun is ~150M km away, effectively parallel rays)
const sunLight = new THREE.DirectionalLight(0xffffff, 2.2);
sunLight.position.set(150000000 * SCENE_SCALE, 0, 0); // Sun on +X roughly
scene.add(sunLight);

// Tiny ambient so dark sides aren't pure black
const ambientLight = new THREE.AmbientLight(0x111122, 0.15);
scene.add(ambientLight);

// ─── STARS ────────────────────────────────────────────────────────────────────

function buildStarField(count = 8000) {
  const positions = new Float32Array(count * 3);
  const colors    = new Float32Array(count * 3);
  const sizes     = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    // Uniform random on sphere surface
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 50000; // far away

    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);

    // Slight color variation: blue-white to warm white
    const warmth = Math.random();
    colors[i * 3]     = 0.85 + warmth * 0.15;
    colors[i * 3 + 1] = 0.85 + warmth * 0.05;
    colors[i * 3 + 2] = 0.95 - warmth * 0.15;

    sizes[i] = 0.5 + Math.random() * 1.5;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 1.2,
    sizeAttenuation: false,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
  });

  return new THREE.Points(geo, mat);
}

scene.add(buildStarField());

// ─── SUN ─────────────────────────────────────────────────────────────────────
// Sun is ~150M km away — placed at 30,000 scene units in the correct direction.
// Angular size from Earth: ~0.53°, same as the Moon (hence total solar eclipses).

const SUN_SCENE_DIST = 30000;
// Sphere radius to match true 0.53° angular diameter at SUN_SCENE_DIST
const SUN_SPHERE_R   = SUN_SCENE_DIST * Math.tan(0.00464); // ~139 units

let sunMesh, sunGlowSprite;

function makeSunGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0.00, 'rgba(255, 255, 240, 1.0)');
  grad.addColorStop(0.08, 'rgba(255, 245, 200, 0.9)');
  grad.addColorStop(0.20, 'rgba(255, 220, 100, 0.5)');
  grad.addColorStop(0.45, 'rgba(255, 160,  40, 0.15)');
  grad.addColorStop(0.70, 'rgba(255, 100,  10, 0.04)');
  grad.addColorStop(1.00, 'rgba(255,  80,   0, 0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(canvas);
}

function buildSun() {
  // Solid bright core
  const geo = new THREE.SphereGeometry(SUN_SPHERE_R, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0xfffde0 });
  sunMesh = new THREE.Mesh(geo, mat);
  scene.add(sunMesh);

  // Corona glow — sprite always faces camera, additive blend
  const glowTex = makeSunGlowTexture();
  const glowMat = new THREE.SpriteMaterial({
    map: glowTex,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  sunGlowSprite = new THREE.Sprite(glowMat);
  sunGlowSprite.scale.setScalar(SUN_SPHERE_R * 18); // wide corona
  scene.add(sunGlowSprite);
}

function placeSun(directionVec3) {
  const pos = directionVec3.clone().multiplyScalar(SUN_SCENE_DIST);
  sunMesh.position.copy(pos);
  sunGlowSprite.position.copy(pos);
  sunLight.position.copy(pos);
}

buildSun();
placeSun(approxSunDirection(new Date()));

// ─── EARTH ────────────────────────────────────────────────────────────────────

const loader = new THREE.TextureLoader();

let earthMesh, cloudMesh, moonMesh;
let positionsReady = false;

function buildEarth(dayTex, cloudTex) {
  const geo = new THREE.SphereGeometry(EARTH_RADIUS_KM * SCENE_SCALE, 64, 64);
  const mat = new THREE.MeshPhongMaterial({
    map:       dayTex,
    specular:  new THREE.Color(0x222222),
    shininess: 8,
  });
  earthMesh = new THREE.Mesh(geo, mat);
  scene.add(earthMesh);

  // Cloud layer — slightly larger sphere on top
  const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS_KM * SCENE_SCALE * 1.005, 64, 64);
  const cloudMat = new THREE.MeshPhongMaterial({
    map:         cloudTex,
    transparent: true,
    opacity:     0.6,
    depthWrite:  false,
  });
  cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
  scene.add(cloudMesh);
}

function buildMoon(moonTex) {
  const geo = new THREE.SphereGeometry(MOON_RADIUS_KM * SCENE_SCALE, 48, 48);
  const mat = new THREE.MeshPhongMaterial({
    map:       moonTex,
    specular:  new THREE.Color(0x000000),
    shininess: 1,
  });
  moonMesh = new THREE.Mesh(geo, mat);
  scene.add(moonMesh);
}

// ─── TEXTURE LOADING ─────────────────────────────────────────────────────────

function makeCloudTexture() {
  const size = 1024;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size / 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Scatter soft white blobs for cloud cover
  for (let i = 0; i < 1800; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = 6 + Math.random() * 28;
    const alpha = 0.06 + Math.random() * 0.18;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(255,255,255,${alpha})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

const setStatus = s => { document.getElementById('loading-status').textContent = s; };

Promise.all([
  new Promise(r => loader.load(TEXTURES.earthDay, t => r(t), undefined, () => r(null))),
  new Promise(r => loader.load(TEXTURES.moon,     t => r(t), undefined, () => r(null))),
]).then(([dayTex, moonTex]) => {
  setStatus('Building scene...');

  if (!dayTex) {
    dayTex = new THREE.DataTexture(new Uint8Array([30, 80, 160, 255]), 1, 1, THREE.RGBAFormat);
    dayTex.needsUpdate = true;
  }
  if (!moonTex) {
    moonTex = new THREE.DataTexture(new Uint8Array([160, 155, 145, 255]), 1, 1, THREE.RGBAFormat);
    moonTex.needsUpdate = true;
  }

  buildEarth(dayTex, makeCloudTexture());
  buildMoon(moonTex);

  document.getElementById('loading').style.display = 'none';
  positionsReady = true;

  startPositionUpdates();
  checkVRSupport();
});

// ─── POSITION UPDATES ────────────────────────────────────────────────────────

let cameraInitialized = false;

// Set yaw/pitch so the render loop points camera toward a scene position
function aimCameraAt(x, y, z) {
  const len = Math.sqrt(x * x + y * y + z * z);
  if (len === 0) return;
  const dx = x / len, dy = y / len, dz = z / len;
  pitch = Math.asin(Math.max(-1, Math.min(1, dy)));
  yaw   = Math.atan2(-dx, -dz);
}

function applyFallbackPositions() {
  // Demo: Earth 22,000 km behind, Moon 369,000 km ahead
  const eScene = -22000 * SCENE_SCALE;
  const mScene =  369000 * SCENE_SCALE;
  earthMesh.position.set(0, 0, eScene);
  cloudMesh.position.set(0, 0, eScene);
  moonMesh.position.set(0, 0, mScene);
  if (!cameraInitialized) { aimCameraAt(0, 0, eScene); cameraInitialized = true; }
  placeSun(approxSunDirection(new Date()));
}

async function fetchAndApply() {
  const now = new Date();
  try {
    const status = await fetchArtemisStatus();
    const { lat, lon, d_earth, d_moon, vel } = status.telemetry;

    // Spacecraft XYZ relative to Earth center
    const craft = geocentricToXYZ(lat, lon, d_earth);

    // Moon XYZ relative to Earth center (approximate)
    const moon = approxMoonPos(now);

    // Update Sun position and lighting
    placeSun(approxSunDirection(now));

    // Place everything relative to spacecraft (camera stays at origin)
    const toScene = (abs) => ({
      x: (abs.x - craft.x) * SCENE_SCALE,
      y: (abs.y - craft.y) * SCENE_SCALE,
      z: (abs.z - craft.z) * SCENE_SCALE,
    });

    const eRel = toScene({ x: 0, y: 0, z: 0 }); // Earth at geocenter
    const mRel = toScene(moon);

    earthMesh.position.set(eRel.x, eRel.y, eRel.z);
    cloudMesh.position.set(eRel.x, eRel.y, eRel.z);
    moonMesh.position.set(mRel.x, mRel.y, mRel.z);

    // Aim camera at Earth on first load (sets yaw/pitch so render loop agrees)
    if (!hasDragged && !cameraInitialized) {
      aimCameraAt(eRel.x, eRel.y, eRel.z);
      cameraInitialized = true;
    }

    // HUD
    document.getElementById('dist-earth').textContent = formatKm(d_earth);
    document.getElementById('dist-moon').textContent  = formatKm(d_moon);
    document.getElementById('velocity').textContent   = Math.round(vel).toLocaleString() + ' km/h';
    document.getElementById('hud-date').textContent   = now.toUTCString().slice(0, 25) + ' UTC';
    document.getElementById('met-phase').textContent  = status.current_phase;

  } catch (e) {
    console.warn('Telemetry fetch failed, using fallback:', e);
    document.getElementById('met-phase').textContent = 'no telemetry — open via http';
    if (!cameraInitialized) applyFallbackPositions();
  }
}

function formatKm(km) {
  return Math.round(km).toLocaleString() + ' km';
}

function startPositionUpdates() {
  applyFallbackPositions(); // show something immediately
  fetchAndApply();          // then replace with live data
  setInterval(fetchAndApply, 30000);
}

// ─── ZOOM ────────────────────────────────────────────────────────────────────

let targetFOV = FOV_DEFAULT;

window.addEventListener('wheel', e => {
  targetFOV += e.deltaY * ZOOM_SPEED;
  targetFOV = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFOV));
}, { passive: true });

// Pinch on mobile
let lastPinchDist = null;
window.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (lastPinchDist !== null) {
    const delta = lastPinchDist - dist;
    targetFOV += delta * 0.1;
    targetFOV = Math.max(FOV_MIN, Math.min(FOV_MAX, targetFOV));
  }
  lastPinchDist = dist;
}, { passive: true });
window.addEventListener('touchend', () => { lastPinchDist = null; });

// ─── MOUSE LOOK ──────────────────────────────────────────────────────────────
// Drag to look around (within window)

let isDragging = false;
let hasDragged = false;
let prevMouse  = { x: 0, y: 0 };
let yaw = 0, pitch = 0;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  hasDragged = true;
  yaw   -= dx * 0.002;
  pitch -= dy * 0.002;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
  prevMouse = { x: e.clientX, y: e.clientY };
});

// ─── VR SUPPORT ──────────────────────────────────────────────────────────────

function checkVRSupport() {
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (supported) {
        const btn = document.getElementById('vr-btn');
        btn.classList.remove('hidden');
        btn.addEventListener('click', enterVR);
      }
    });
  }
}

let xrSession = null;

async function enterVR() {
  if (xrSession) {
    xrSession.end();
    return;
  }
  try {
    renderer.xr.enabled = true;
    xrSession = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(xrSession);
    document.getElementById('vr-btn').textContent = 'Exit VR';
    xrSession.addEventListener('end', () => {
      xrSession = null;
      renderer.xr.enabled = false;
      document.getElementById('vr-btn').textContent = 'Enter VR';
    });
  } catch (e) {
    console.warn('VR not available:', e);
  }
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

const clock = new THREE.Clock();

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Smooth FOV
  camera.fov += (targetFOV - camera.fov) * 0.12;
  camera.updateProjectionMatrix();

  // Slow Earth rotation
  if (earthMesh) {
    earthMesh.rotation.y += delta * 0.005;
    cloudMesh.rotation.y += delta * 0.006; // clouds drift slightly faster
  }

  // Moon rotation (tidally locked — but we spin very slowly for visual interest)
  if (moonMesh) {
    moonMesh.rotation.y += delta * 0.001;
  }

  // Apply mouse look rotation to camera
  if (!renderer.xr.enabled) {
    const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
    camera.quaternion.setFromEuler(euler);
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
