<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artemis II — Window View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* Window frame overlay */
    #window-frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.85) 100%);
      border: 18px solid #1a1a1a;
      border-radius: 48px;
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.9),
        inset 0 0 8px rgba(255,255,255,0.04),
        0 0 0 4px #111;
    }

    /* HUD */
    #hud {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 40px;
      align-items: flex-end;
    }

    .hud-block {
      text-align: center;
      opacity: 0.7;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.05em;
    }

    #hud-date {
      font-size: 10px;
      color: #666;
      letter-spacing: 0.15em;
    }

    /* Lens selector */
    #lens-select {
      position: fixed;
      top: 36px;
      right: 44px;
      z-index: 20;
      display: flex;
      gap: 6px;
    }

    .lens-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #444;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .lens-btn:hover { border-color: #555; color: #888; }
    .lens-btn.active { border-color: #555; color: #ccc; background: rgba(255,255,255,0.04); }

    /* VR button */
    #vr-btn {
      position: fixed;
      top: 36px;
      left: 44px;
      z-index: 20;
      background: none;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    #vr-btn:hover { border-color: #888; color: #ccc; }
    #vr-btn.hidden { display: none; }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      gap: 16px;
    }
    #loading-title {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
    }
    #loading-status {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #333;
    }

    /* Mission phase / title */
    #met {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
    }
    #met-title {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #333;
      text-transform: uppercase;
    }
    #met-phase {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: #2a4a2a;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Planet labels */
    #planet-labels {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }
    .planet-label {
      position: absolute;
      font-size: 8px;
      letter-spacing: 0.18em;
      color: #666;
      text-transform: uppercase;
      transform: translate(-50%, 14px);
      white-space: nowrap;
    }

    /* Telemetry status dot */
    #telemetry-status {
      position: fixed;
      bottom: 40px;
      right: 44px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.6;
    }
    #status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2a4a2a;
    }
    #status-dot.live {
      background: #3a7a3a;
      box-shadow: 0 0 6px #3a7a3a;
      animation: pulse 2s infinite;
    }
    #status-dot.offline { background: #6a2a2a; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    #status-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-title">Artemis II</div>
  <div id="loading-status">Loading textures...</div>
</div>

<div id="canvas-container"></div>
<div id="window-frame"></div>

<div id="met">
  <div id="met-title">Artemis II — Window View</div>
  <div id="met-phase">—</div>
</div>
<div id="lens-select">
  <button class="lens-btn active" data-fov="60">Eye</button>
  <button class="lens-btn" data-fov="27">50mm</button>
  <button class="lens-btn" data-fov="16">85mm</button>
  <button class="lens-btn" data-fov="7">200mm</button>
</div>

<button id="vr-btn" class="hidden">Enter VR</button>

<div id="planet-labels"></div>

<div id="telemetry-status">
  <div id="status-dot"></div>
  <div id="status-label">—</div>
</div>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Distance to Earth</div>
    <div class="hud-value" id="dist-earth">—</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Velocity</div>
    <div class="hud-value" id="velocity">—</div>
    <div id="hud-date">—</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Distance to Moon</div>
    <div class="hud-value" id="dist-moon">—</div>
  </div>
</div>

<!-- Three.js r158 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────

const EARTH_RADIUS_KM  = 6371;
const MOON_RADIUS_KM   = 1737;
const SCENE_SCALE      = 1 / 10000; // 1 scene unit = 10,000 km
const FOV_DEFAULT = 60; // human eye

// Textures from CORS-friendly CDNs
const TEXTURES = {
  earthDay: 'https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg',
  moon:     'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg',
};

// ─── LIVE TELEMETRY ──────────────────────────────────────────────────────────
// Primary: NASA AROW GCS bucket — ECI state vector, no proxies needed
// Parameters: 2003/2004/2005 = position X/Y/Z (meters, J2000 ECI)
//             2009/2010/2011 = velocity X/Y/Z (m/s)
// Secondary (fire-and-forget): launchwatch for mission phase text only

const GCS_BASE = 'https://storage.googleapis.com/storage/v1/b/p-2-cen1/o';
let nasaFilePath = 'October%2F1%2FOctober_105_1.txt';

// Launchwatch used only for phase text (best-effort, CORS proxies)
const LAUNCHWATCH_URL = 'https://launchwatch.modelotech.com/api/artemis2/status';
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${url}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

function fetchWithTimeout(url, ms = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

function parseNASAEphemeris(data) {
  const pv = (id) => parseFloat(data[`Parameter_${id}`]?.Value);
  const x = pv(2003), y = pv(2004), z = pv(2005);
  const vx = pv(2009), vy = pv(2010), vz = pv(2011);
  if (isNaN(x) || isNaN(y) || isNaN(z)) throw new Error('Missing ECI position params');
  return { x, y, z, vx: isNaN(vx) ? 0 : vx, vy: isNaN(vy) ? 0 : vy, vz: isNaN(vz) ? 0 : vz };
}

async function fetchNASAEphemeris() {
  // Try known file path first
  try {
    const res = await fetchWithTimeout(`${GCS_BASE}/${nasaFilePath}?alt=media`);
    if (res.ok) {
      const data = await res.json();
      if (data.File?.Activity === 'MIS') return parseNASAEphemeris(data);
    }
  } catch (_) {}
  // Discover current live file by listing bucket
  const listRes = await fetchWithTimeout(`${GCS_BASE}?prefix=October%2F1%2F`);
  if (!listRes.ok) throw new Error('NASA GCS unavailable');
  const listing = await listRes.json();
  for (const item of (listing.items || [])) {
    if (!item.name.endsWith('.txt')) continue;
    const r = await fetchWithTimeout(`${GCS_BASE}/${encodeURIComponent(item.name)}?alt=media`);
    if (!r.ok) continue;
    const d = await r.json();
    if (d.File?.Activity === 'MIS') {
      nasaFilePath = encodeURIComponent(item.name);
      return parseNASAEphemeris(d);
    }
  }
  throw new Error('No live NASA telemetry found');
}

// Fire-and-forget: fetch phase text from launchwatch, update HUD if it works
async function fetchPhaseText() {
  for (const makeUrl of CORS_PROXIES) {
    try {
      const res = await fetchWithTimeout(makeUrl(LAUNCHWATCH_URL), 6000);
      if (res.ok) {
        const data = await res.json();
        if (data.current_phase) document.getElementById('met-phase').textContent = data.current_phase;
        return;
      }
    } catch (_) {}
  }
}

// Convert geocentric lat/lon + radius to Cartesian (Y-up)
function geocentricToXYZ(latDeg, lonDeg, radiusKm) {
  const lat = latDeg * Math.PI / 180;
  const lon = lonDeg * Math.PI / 180;
  return {
    x:  radiusKm * Math.cos(lat) * Math.cos(lon),
    y:  radiusKm * Math.sin(lat),
    z:  radiusKm * Math.cos(lat) * Math.sin(lon),
  };
}

// Approximate Moon position relative to Earth (geocentric equatorial, km)
// Good to ~1° — enough for visual placement
function approxMoonPos(date) {
  const D = (date - new Date('2000-01-01T12:00:00Z')) / 86400000; // days from J2000
  const L = (218.316 + 13.176396 * D) * Math.PI / 180;
  const M = (134.963 + 13.064993 * D) * Math.PI / 180;
  const F = (93.272  + 13.229350 * D) * Math.PI / 180;
  const lon = L + 6.289 * Math.sin(M) * Math.PI / 180;
  const lat = 5.128 * Math.sin(F) * Math.PI / 180;
  const r   = 385001 - 20905 * Math.cos(M); // km
  // Convert ecliptic to equatorial (obliquity ~23.44°)
  const eps = 23.44 * Math.PI / 180;
  return {
    x: r * Math.cos(lat) * Math.cos(lon),
    y: r * (Math.cos(eps) * Math.cos(lat) * Math.sin(lon) - Math.sin(eps) * Math.sin(lat)),
    z: r * (Math.sin(eps) * Math.cos(lat) * Math.sin(lon) + Math.cos(eps) * Math.sin(lat)),
  };
}

// Approximate Sun direction from Earth (for lighting)
function approxSunDirection(date) {
  const D = (date - new Date('2000-01-01T12:00:00Z')) / 86400000;
  const L = (280.46 + 0.9856474 * D) * Math.PI / 180;
  const g = (357.528 + 0.9856003 * D) * Math.PI / 180;
  const lon = L + 1.915 * Math.sin(g) * Math.PI / 180 + 0.020 * Math.sin(2 * g) * Math.PI / 180;
  const eps = 23.44 * Math.PI / 180;
  return new THREE.Vector3(
    Math.cos(lon),
    Math.sin(eps) * Math.sin(lon),
    -Math.cos(eps) * Math.sin(lon)
  ).normalize();
}

// ─── SCENE ────────────────────────────────────────────────────────────────────

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(FOV_DEFAULT, innerWidth / innerHeight, 0.0001, 1e8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────

// Sun — very bright, directional (Sun is ~150M km away, effectively parallel rays)
const sunLight = new THREE.DirectionalLight(0xffffff, 2.2);
sunLight.position.set(150000000 * SCENE_SCALE, 0, 0); // Sun on +X roughly
scene.add(sunLight);

// Very faint ambient — Earth/Moon dark sides near-black, not grey
const ambientLight = new THREE.AmbientLight(0x111122, 0.05);
scene.add(ambientLight);

// ─── STARS ────────────────────────────────────────────────────────────────────

// ─── STAR CATALOG (Hipparcos / d3-celestial, mag ≤ 6) ────────────────────────

const STAR_CATALOG_URL = 'https://raw.githubusercontent.com/ofrohn/d3-celestial/master/data/stars.6.json';

// B-V color index → approximate RGB (blackbody: blue-hot → red-cool)
function bvToRGB(bv) {
  bv = parseFloat(bv);
  if (isNaN(bv)) return [1.0, 1.0, 1.0];
  if (bv < -0.2) return [0.60, 0.75, 1.00]; // O — blue
  if (bv <  0.0) return [0.75, 0.88, 1.00]; // B — blue-white
  if (bv <  0.3) return [0.96, 0.97, 1.00]; // A — white
  if (bv <  0.6) return [1.00, 0.96, 0.86]; // F — yellow-white
  if (bv <  1.0) return [1.00, 0.84, 0.58]; // G/K — yellow-orange
  if (bv <  1.5) return [1.00, 0.63, 0.32]; // K/M — orange
  return               [1.00, 0.42, 0.18];  // M — red
}

// Custom shader so each star has its own magnitude-based size and a soft disc shape
const STAR_VERT = `
  attribute float starSize;
  attribute vec3  starColor;
  varying   vec3  vColor;
  void main() {
    vColor = starColor;
    gl_PointSize = starSize;
    gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const STAR_FRAG = `
  varying vec3 vColor;
  void main() {
    float d = length(gl_PointCoord - vec2(0.5)) * 2.0;
    if (d > 1.0) discard;
    float a = exp(-d * d * 4.0); // Gaussian glow
    gl_FragColor = vec4(vColor, a);
  }
`;

function buildAccurateStarField(features) {
  const R   = 50000;
  const n   = features.length;
  const pos = new Float32Array(n * 3);
  const col = new Float32Array(n * 3);
  const sz  = new Float32Array(n);

  features.forEach((f, i) => {
    const [ra_deg, dec_deg] = f.geometry.coordinates;
    const mag = f.properties.mag;
    const bv  = f.properties.bv;

    const ra  = ra_deg  * Math.PI / 180;
    const dec = dec_deg * Math.PI / 180;

    // Equatorial → scene XYZ (Y=north pole, X=vernal equinox, Z=-RA90°)
    pos[i*3]   =  R * Math.cos(dec) * Math.cos(ra);
    pos[i*3+1] =  R * Math.sin(dec);
    pos[i*3+2] = -R * Math.cos(dec) * Math.sin(ra);

    const [r, g, b] = bvToRGB(bv);
    col[i*3] = r; col[i*3+1] = g; col[i*3+2] = b;

    // Pixel size: brighter = larger (mag scale is log)
    sz[i] = Math.max(1.0, 5.5 - mag * 0.75);
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('starColor', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('starSize',  new THREE.BufferAttribute(sz,  1));

  const mat = new THREE.ShaderMaterial({
    vertexShader:   STAR_VERT,
    fragmentShader: STAR_FRAG,
    transparent: true,
    depthWrite:  false,
  });

  return new THREE.Points(geo, mat);
}

// Fallback random field (shown only if catalog fails to load)
function buildRandomStarField(count = 6000) {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const sz  = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 50000;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const w = Math.random();
    col[i*3] = 0.85 + w*0.15; col[i*3+1] = 0.85 + w*0.05; col[i*3+2] = 0.95 - w*0.15;
    sz[i] = 1.0 + Math.random();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('starColor', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('starSize',  new THREE.BufferAttribute(sz,  1));
  return new THREE.Points(geo, new THREE.ShaderMaterial({
    vertexShader: STAR_VERT, fragmentShader: STAR_FRAG, transparent: true, depthWrite: false,
  }));
}

// ─── PLANETS ─────────────────────────────────────────────────────────────────
// Orbital elements from JPL (epoch J2000). L,omega,Omega in degrees/century.

const PLANET_ELEMS = [
  { name:'Mercury', col:0xcccccc, L0:252.251, L1:149472.675, a:0.38710, e0:0.20563, e1: 2.1e-5, i0:7.005, i1:-5.9e-3, om0: 77.458, om1:0.1594, O0: 48.340, O1:-0.1221, mag:-0.5 },
  { name:'Venus',   col:0xfff5cc, L0:181.980, L1: 58517.816, a:0.72333, e0:0.00677, e1:-5.1e-5, i0:3.395, i1: 4.3e-4, om0:131.768, om1:0.0568, O0: 76.673, O1:-0.2727, mag:-4.0 },
  { name:'Mars',    col:0xff7744, L0: -4.568, L1: 19140.299, a:1.52371, e0:0.09337, e1: 9.1e-5, i0:1.852, i1:-7.2e-3, om0:-23.917, om1:0.4522, O0: 49.713, O1:-0.2685, mag: 0.5 },
  { name:'Jupiter', col:0xffddaa, L0: 34.335, L1:  3034.904, a:5.20248, e0:0.04854, e1: 1.8e-4, i0:1.299, i1:-3.2e-3, om0: 14.275, om1:0.1820, O0:100.293, O1: 0.1302, mag:-2.0 },
  { name:'Saturn',  col:0xfff0cc, L0: 50.076, L1:  1222.115, a:9.54150, e0:0.05551, e1:-3.2e-4, i0:2.494, i1: 4.5e-3, om0: 92.861, om1:0.5418, O0:113.640, O1:-0.2502, mag: 0.7 },
];

function planetHelioEcl(p, T) {
  const d2r = Math.PI / 180;
  const L   = (p.L0  + p.L1  * T) * d2r;
  const e   =  p.e0  + p.e1  * T;
  const inc = (p.i0  + p.i1  * T) * d2r;
  const om  = (p.om0 + p.om1 * T) * d2r;
  const Om  = (p.O0  + p.O1  * T) * d2r;
  let M = L - om;
  // Solve Kepler's equation iteratively
  let E = M;
  for (let k = 0; k < 8; k++) E = M + e * Math.sin(E);
  const nu = 2 * Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
  const r  = p.a * (1 - e * Math.cos(E));
  const u  = nu + om - Om;
  return {
    x: r*(Math.cos(Om)*Math.cos(u) - Math.sin(Om)*Math.sin(u)*Math.cos(inc)),
    y: r*(Math.sin(Om)*Math.cos(u) + Math.cos(Om)*Math.sin(u)*Math.cos(inc)),
    z: r*(Math.sin(u)*Math.sin(inc)),
  };
}

function eclToScene(x, y, z) {
  // Heliocentric ecliptic → our scene equatorial (Y=north, X=vernal equinox, -Z=RA90°)
  const eps = 23.44 * Math.PI / 180;
  return new THREE.Vector3(x, y*Math.sin(eps)+z*Math.cos(eps), -y*Math.cos(eps)+z*Math.sin(eps));
}

// Earth orbital elements (same machinery, used to get geocentric positions)
const EARTH_ELEM = { L0:100.467, L1:35999.373, a:1.00000, e0:0.01671, e1:-3.6e-5, i0:0.0, i1:0.0, om0:102.930, om1:0.3195, O0:0.0, O1:0.0 };

let planetMarkers = []; // { sprite, labelEl, scenePosNorm }

function buildPlanetMarkers(date) {
  // Remove old
  planetMarkers.forEach(m => { scene.remove(m.sprite); m.labelEl.remove(); });
  planetMarkers = [];

  const T = (date - new Date('2000-01-01T12:00:00Z')) / (365.25 * 86400000 * 100);
  const earth = planetHelioEcl(EARTH_ELEM, T);

  const labelContainer = document.getElementById('planet-labels');

  PLANET_ELEMS.forEach(p => {
    const hel = planetHelioEcl(p, T);
    // Geocentric ecliptic
    const gx = hel.x - earth.x, gy = hel.y - earth.y, gz = hel.z - earth.z;
    const dir = eclToScene(gx, gy, gz).normalize();

    // Glow sprite
    const glowTex = makePlanetGlowTexture(p.col);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
    }));
    // Place far out on the star sphere, size scaled by magnitude
    const dist = 45000;
    sprite.position.copy(dir.clone().multiplyScalar(dist));
    // Planets look like very bright stars — tight point, barely a disc
    const glowSize = Math.max(60, 180 - p.mag * 45);
    sprite.scale.setScalar(glowSize);
    scene.add(sprite);

    // DOM label
    const labelEl = document.createElement('div');
    labelEl.className = 'planet-label';
    labelEl.textContent = p.name;
    labelContainer.appendChild(labelEl);

    planetMarkers.push({ sprite, labelEl, dir });
  });
}

function makePlanetGlowTexture(hexColor) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  const r = new THREE.Color(hexColor);
  const grad = ctx.createRadialGradient(32,32,0, 32,32,32);
  const R2 = Math.round(r.r*255), G2 = Math.round(r.g*255), B2 = Math.round(r.b*255);
  grad.addColorStop(0.00, `rgba(255,255,255,1.0)`);           // white hot core
  grad.addColorStop(0.12, `rgba(${R2},${G2},${B2},0.9)`);    // planet colour
  grad.addColorStop(0.30, `rgba(${R2},${G2},${B2},0.25)`);   // fast falloff
  grad.addColorStop(0.55, `rgba(${R2},${G2},${B2},0.04)`);
  grad.addColorStop(1.00, `rgba(${R2},${G2},${B2},0.0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

function updatePlanetLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  planetMarkers.forEach(({ sprite, labelEl }) => {
    const pos = sprite.position.clone().project(camera);
    if (pos.z > 1) { labelEl.style.display = 'none'; return; }
    labelEl.style.display = 'block';
    labelEl.style.left = ((pos.x * 0.5 + 0.5) * w) + 'px';
    labelEl.style.top  = ((-pos.y * 0.5 + 0.5) * h) + 'px';
  });
}

// ─── SUN ─────────────────────────────────────────────────────────────────────
// Sun is ~150M km away — placed at 30,000 scene units in the correct direction.
// Angular size from Earth: ~0.53°, same as the Moon (hence total solar eclipses).

const SUN_SCENE_DIST = 30000;
// Sphere radius to match true 0.53° angular diameter at SUN_SCENE_DIST
const SUN_SPHERE_R   = SUN_SCENE_DIST * Math.tan(0.00464); // ~139 units

let sunMesh, sunGlowSprite;

function makeSunGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  grad.addColorStop(0.00, 'rgba(255, 255, 240, 1.0)');
  grad.addColorStop(0.08, 'rgba(255, 245, 200, 0.9)');
  grad.addColorStop(0.20, 'rgba(255, 220, 100, 0.5)');
  grad.addColorStop(0.45, 'rgba(255, 160,  40, 0.15)');
  grad.addColorStop(0.70, 'rgba(255, 100,  10, 0.04)');
  grad.addColorStop(1.00, 'rgba(255,  80,   0, 0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(canvas);
}

function buildSun() {
  // Solid bright core
  const geo = new THREE.SphereGeometry(SUN_SPHERE_R, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0xfffde0 });
  sunMesh = new THREE.Mesh(geo, mat);
  scene.add(sunMesh);

  // Corona glow — sprite always faces camera, additive blend
  const glowTex = makeSunGlowTexture();
  const glowMat = new THREE.SpriteMaterial({
    map: glowTex,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });
  sunGlowSprite = new THREE.Sprite(glowMat);
  sunGlowSprite.scale.setScalar(SUN_SPHERE_R * 18); // wide corona
  scene.add(sunGlowSprite);
}

function placeSun(directionVec3) {
  const pos = directionVec3.clone().multiplyScalar(SUN_SCENE_DIST);
  sunMesh.position.copy(pos);
  sunGlowSprite.position.copy(pos);
  sunLight.position.copy(pos);
}

buildSun();
placeSun(approxSunDirection(new Date()));

// ─── EARTH ────────────────────────────────────────────────────────────────────

const loader = new THREE.TextureLoader();

let earthMesh, moonMesh;
let positionsReady = false;

function buildEarth(dayTex) {
  const geo = new THREE.SphereGeometry(EARTH_RADIUS_KM * SCENE_SCALE, 64, 64);
  const mat = new THREE.MeshPhongMaterial({
    map:       dayTex,
    specular:  new THREE.Color(0x224488),
    shininess: 12,
  });
  earthMesh = new THREE.Mesh(geo, mat);
  scene.add(earthMesh);
}

function buildMoon(moonTex) {
  const geo = new THREE.SphereGeometry(MOON_RADIUS_KM * SCENE_SCALE, 48, 48);
  const mat = new THREE.MeshPhongMaterial({
    map:       moonTex,
    specular:  new THREE.Color(0x000000),
    shininess: 1,
    emissive:  new THREE.Color(0x000000), // no self-illumination — dark side truly dark
  });
  moonMesh = new THREE.Mesh(geo, mat);
  scene.add(moonMesh);
}

// ─── TEXTURE LOADING ─────────────────────────────────────────────────────────


const setStatus = s => { document.getElementById('loading-status').textContent = s; };

Promise.all([
  new Promise(r => loader.load(TEXTURES.earthDay, t => r(t), undefined, () => r(null))),
  new Promise(r => loader.load(TEXTURES.moon,     t => r(t), undefined, () => r(null))),
  fetch(STAR_CATALOG_URL).then(r => r.json()).catch(() => null),
]).then(([dayTex, moonTex, starData]) => {
  setStatus('Building scene...');

  if (!dayTex) {
    dayTex = new THREE.DataTexture(new Uint8Array([30, 80, 160, 255]), 1, 1, THREE.RGBAFormat);
    dayTex.needsUpdate = true;
  }
  if (!moonTex) {
    moonTex = new THREE.DataTexture(new Uint8Array([160, 155, 145, 255]), 1, 1, THREE.RGBAFormat);
    moonTex.needsUpdate = true;
  }

  const stars = (starData && starData.features)
    ? buildAccurateStarField(starData.features)
    : buildRandomStarField();
  scene.add(stars);

  buildEarth(dayTex);
  buildMoon(moonTex);

  document.getElementById('loading').style.display = 'none';
  positionsReady = true;

  buildPlanetMarkers(new Date());
  startPositionUpdates();
  checkVRSupport();
});

// ─── POSITION UPDATES ────────────────────────────────────────────────────────

let cameraInitialized = false;
let lastGoodTelemetry  = null; // cache last successful fetch

function setTelemetryStatus(live, label) {
  const dot = document.getElementById('status-dot');
  dot.className = live ? 'live' : 'offline';
  document.getElementById('status-label').textContent = label;
}

// Set yaw/pitch so the render loop points camera toward a scene position
function aimCameraAt(x, y, z) {
  const len = Math.sqrt(x * x + y * y + z * z);
  if (len === 0) return;
  const dx = x / len, dy = y / len, dz = z / len;
  pitch = Math.asin(Math.max(-1, Math.min(1, dy)));
  yaw   = Math.atan2(-dx, -dz);
}

function applyFallbackPositions() {
  const eScene = -22000 * SCENE_SCALE;
  const mScene =  369000 * SCENE_SCALE;
  earthMesh.position.set(0, 0, eScene);
  moonMesh.position.set(0, 0, mScene);
  if (!cameraInitialized) { aimCameraAt(0, 0, eScene); cameraInitialized = true; }
  placeSun(approxSunDirection(new Date()));
}

async function fetchAndApply() {
  const now = new Date();
  try {
    const eph = await fetchNASAEphemeris();

    // ECI position in km (J2000: x=vernal equinox, y=RA90°, z=north pole)
    const cx = eph.x / 1000, cy = eph.y / 1000, cz = eph.z / 1000;

    // Moon ECI position in km (same frame — x=vernal equinox, y=RA90°, z=north pole)
    const moon = approxMoonPos(now);

    placeSun(approxSunDirection(now));

    // ECI → scene: scene has y=north pole, z=-(RA90°), x=vernal equinox
    // So: scene(x,y,z) = (eci_x, eci_z, -eci_y) relative to spacecraft
    const eciRelToScene = (eci_km) => ({
      x:  (eci_km.x - cx) * SCENE_SCALE,
      y:  (eci_km.z - cz) * SCENE_SCALE,
      z: -(eci_km.y - cy) * SCENE_SCALE,
    });

    const eRel = eciRelToScene({ x: 0, y: 0, z: 0 }); // Earth at ECI origin
    const mRel = eciRelToScene(moon);

    earthMesh.position.set(eRel.x, eRel.y, eRel.z);
    moonMesh.position.set(mRel.x, mRel.y, mRel.z);

    if (!hasDragged && !cameraInitialized) {
      aimCameraAt(eRel.x, eRel.y, eRel.z);
      cameraInitialized = true;
    }

    // Derive HUD values from state vector
    const d_earth = Math.sqrt(cx*cx + cy*cy + cz*cz);
    const vel_ms  = Math.sqrt(eph.vx*eph.vx + eph.vy*eph.vy + eph.vz*eph.vz);
    const dx = moon.x - cx, dy = moon.y - cy, dz = moon.z - cz;
    const d_moon = Math.sqrt(dx*dx + dy*dy + dz*dz);

    lastGoodTelemetry = { d_earth, d_moon, vel_kmh: vel_ms * 3.6, fetchedAt: now };

    document.getElementById('dist-earth').textContent = formatKm(d_earth);
    document.getElementById('dist-moon').textContent  = formatKm(d_moon);
    document.getElementById('velocity').textContent   = Math.round(vel_ms * 3.6).toLocaleString() + ' km/h';
    document.getElementById('hud-date').textContent   = now.toUTCString().slice(0, 25) + ' UTC';
    setTelemetryStatus(true, 'live');

    fetchPhaseText(); // fire-and-forget: update phase label if launchwatch responds

  } catch (e) {
    console.warn('Telemetry fetch failed:', e);

    if (lastGoodTelemetry) {
      const minsAgo = Math.round((now - lastGoodTelemetry.fetchedAt) / 60000);
      const age = minsAgo < 2 ? 'moments ago' : `${minsAgo}m ago`;
      setTelemetryStatus(false, `last data ${age}`);
    } else {
      setTelemetryStatus(false, 'telemetry unavailable');
      document.getElementById('met-phase').textContent = '—';
      if (!cameraInitialized) applyFallbackPositions();
    }
  }
}

function formatKm(km) {
  return Math.round(km).toLocaleString() + ' km';
}

function startPositionUpdates() {
  applyFallbackPositions(); // show something immediately
  fetchAndApply();          // then replace with live data
  setInterval(fetchAndApply, 300000); // every 5 minutes
}

// ─── LENS SELECTOR ───────────────────────────────────────────────────────────

let targetFOV = FOV_DEFAULT;

document.querySelectorAll('.lens-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    targetFOV = parseFloat(btn.dataset.fov);
    document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── MOUSE LOOK ──────────────────────────────────────────────────────────────
// Drag to look around (within window)

let isDragging = false;
let hasDragged = false;
let prevMouse  = { x: 0, y: 0 };
let yaw = 0, pitch = 0;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  hasDragged = true;
  yaw   -= dx * 0.002;
  pitch -= dy * 0.002;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
  prevMouse = { x: e.clientX, y: e.clientY };
});

// ─── VR SUPPORT ──────────────────────────────────────────────────────────────

function checkVRSupport() {
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
      if (supported) {
        const btn = document.getElementById('vr-btn');
        btn.classList.remove('hidden');
        btn.addEventListener('click', enterVR);
      }
    });
  }
}

let xrSession = null;

async function enterVR() {
  if (xrSession) {
    xrSession.end();
    return;
  }
  try {
    renderer.xr.enabled = true;
    xrSession = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(xrSession);
    document.getElementById('vr-btn').textContent = 'Exit VR';
    xrSession.addEventListener('end', () => {
      xrSession = null;
      renderer.xr.enabled = false;
      document.getElementById('vr-btn').textContent = 'Enter VR';
    });
  } catch (e) {
    console.warn('VR not available:', e);
  }
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

const clock = new THREE.Clock();

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Smooth FOV
  camera.fov += (targetFOV - camera.fov) * 0.12;
  camera.updateProjectionMatrix();

  // Real-time Earth rotation using Greenwich Mean Sidereal Time (GMST)
  if (earthMesh) {
    const D = (Date.now() - Date.UTC(2000, 0, 1, 12, 0, 0)) / 86400000;
    const GMST = (280.46061837 + 360.98564736629 * D) * Math.PI / 180;
    earthMesh.rotation.y = GMST;
  }

  // Moon is tidally locked — keeps same face toward Earth (slow for visual interest)
  if (moonMesh) {
    moonMesh.rotation.y += delta * 0.001;
  }

  // Apply mouse look rotation to camera
  if (!renderer.xr.enabled) {
    const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
    camera.quaternion.setFromEuler(euler);
  }

  updatePlanetLabels();
  renderer.render(scene, camera);
}

animate();
</script>
