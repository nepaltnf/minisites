<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #666;
      user-select: none;
    }

    h1 {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    #viz {
      display: block;
      filter: drop-shadow(0 2px 18px rgba(0, 0, 0, 0.10));
    }

    /* Grid substrate — the polar paper */
    .grid-ring  { fill: none; stroke: #bbb; stroke-width: 0.4; }
    .grid-spoke { stroke: #bbb; stroke-width: 0.4; }

    /* Data cells */
    .cell {
      stroke: #f5f5f0;
      stroke-width: 0.2;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .cell:hover { stroke: #222; stroke-width: 1.2; }
    .cell.active { stroke: #222; stroke-width: 1.5; }

    /* Sweep line during playback */
    .sweep-line {
      stroke: rgba(255, 255, 255, 0.35);
      stroke-width: 1;
      pointer-events: none;
    }

    /* Controls */
    #controls {
      margin-top: 20px;
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Visual grouping pills */
    .ctrl-group {
      display: flex;
      gap: 7px;
      align-items: center;
      padding: 4px 10px;
      border-radius: 2px;
    }
    .ctrl-group-data   { background: rgba(0,0,0,0.05); }
    .ctrl-group-method { background: rgba(100,70,200,0.07); }
    .ctrl-group-sound  { background: rgba(0,0,0,0.04); }

    button {
      background: transparent;
      border: 1px solid #ccc;
      color: #777;
      padding: 7px 18px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    button:hover { border-color: #888; color: #333; }
    button.playing { border-color: #7755cc; color: #7755cc; }

    /* Play button — most prominent */
    #playBtn {
      background: #3a3a3a;
      border-color: #3a3a3a;
      color: #efefea;
      padding: 8px 24px;
      letter-spacing: 0.2em;
    }
    #playBtn:hover { background: #555; border-color: #555; color: #fff; }
    #playBtn.playing { background: #7755cc; border-color: #7755cc; color: #fff; }

    select {
      background: #f5f5f0;
      border: 1px solid #ccc;
      color: #777;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    select:hover { border-color: #888; }

    label {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #aaa;
    }

    #status {
      margin-top: 12px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #bbb;
      height: 14px;
    }

    #tooltip {
      position: fixed;
      background: rgba(245, 245, 240, 0.95);
      border: 1px solid #ccc;
      color: #555;
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="status">Initializing...</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  RESONANCE ENGINE
//  Universal signal → polar grid → simultaneous color + sound
//
//  Architecture:
//    Ingestion adapter  →  normalize()  →  GridCell[]
//    GridCell[]         →  render()     →  SVG
//    GridCell           →  play()       →  Web Audio API
//
//  Current adapter: NOAA ERDDAP esrlNcepRe (pr_wtr — water vapor)
// ═══════════════════════════════════════════════════════════════════

// ── Config ──────────────────────────────────────────────────────────

const CFG = {
  // SVG canvas
  size: 720,

  // Full globe: 73 latitude bands (90°N → 90°S), 144 longitude sectors
  // North Pole = center ring, South Pole = outermost ring
  numRings: 73,
  numSectors: 144,

  // How much of the radius is filled with data (rest = bare grid = breathing room)
  dataRadiusFraction: 0.82,

  // Minimal gaps between cells
  cellPadAngle: 0.001,
  cellPadRadius: 0.2,

  // Sound range: C4 → C6 (two octaves)
  minFreq: 261.63,
  maxFreq: 1046.50,

  // Data range for water vapor (kg/m²)
  dataMin: 0,
  dataMax: 70,
};

const CX = CFG.size / 2;
const CY = CFG.size / 2;
const MAX_RADIUS = CFG.size / 2 - 4;
const DATA_RADIUS = MAX_RADIUS * CFG.dataRadiusFraction;
const RING_WIDTH  = DATA_RADIUS / CFG.numRings;
const SECTOR_ANGLE = (2 * Math.PI) / CFG.numSectors;

// ── Audio ────────────────────────────────────────────────────────────

let _audioCtx  = null;
let _masterOut = null;
let _waves     = {};   // cached periodic waves

// ── Active dataset state ──────────────────────────────────────────────
let gridCells    = null;
let currentDataset = null;

// Custom smooth waveforms via Fourier series (additive synthesis)
// imag[] = sine harmonics, real[] = cosine harmonics (0 = DC offset)
const WAVE_PARTIALS = {
  // Sine: built-in, no custom wave needed
  warm:  { real: [0, 0, 0, 0],        imag: [0, 1, 0.28, 0.06]        }, // organ warmth
  bell:  { real: [0, 0, 0, 0, 0],     imag: [0, 1, 0.55, 0.25, 0.08]  }, // glass/crystal
  flute: { real: [0, 0, 0, 0, 0, 0],  imag: [0, 1, 0.45, 0, 0.14, 0]  }, // breathy even harmonics
};

function audioCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Master compressor — prevents gain stacking from clipping
    // when many notes fire simultaneously in the tropical band
    const comp = _audioCtx.createDynamicsCompressor();
    comp.threshold.value = -18;  // start compressing at -18dBFS
    comp.knee.value      = 8;
    comp.ratio.value     = 10;
    comp.attack.value    = 0.003;
    comp.release.value   = 0.15;

    const master = _audioCtx.createGain();
    master.gain.value = 0.7;     // headroom below clipping

    comp.connect(master);
    master.connect(_audioCtx.destination);
    _masterOut = comp;           // all voices route here
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, { duration = 0.4, wave = 'sine', volume = 0.25, startAt = null } = {}) {
  const ctx = audioCtx();
  const t   = startAt ?? ctx.currentTime;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();

  if (wave === 'sine') {
    osc.type = 'sine';
  } else if (WAVE_PARTIALS[wave]) {
    // Build and cache the periodic wave on first use
    if (!_waves[wave]) {
      const { real, imag } = WAVE_PARTIALS[wave];
      _waves[wave] = ctx.createPeriodicWave(
        new Float32Array(real), new Float32Array(imag),
        { disableNormalization: false }
      );
    }
    osc.setPeriodicWave(_waves[wave]);
  } else {
    osc.type = 'sine'; // safe fallback
  }

  osc.frequency.setValueAtTime(freq, t);

  // ADSR — soft attack, sustain hold, long decay tail for blending
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume, t + 0.02);
  gain.gain.linearRampToValueAtTime(volume * 0.75, t + duration * 0.2);
  gain.gain.setValueAtTime(volume * 0.75, t + duration * 0.55);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

  osc.connect(gain);
  gain.connect(_masterOut);      // route through compressor, not directly to destination
  osc.start(t);
  osc.stop(t + duration + 0.02);
}

// ── Star polygon overlay ─────────────────────────────────────────────
// The star is functional: its vertices define which sectors are sampled
// each ring during playback. Kath's polygons were never decorative —
// they encode harmonic relationships. Here they literally select the notes.

// Each star shape gets a distinct color (as in Kath's layered drawings)
const STAR_COLORS = {
  3:  ['#ffe600'],               // triangle — electric yellow
  4:  ['#00e5ff'],               // square — cyan
  5:  ['#ff00cc'],               // pentagram — hot magenta
  6:  ['#ffe600', '#ff00cc'],    // hexagram — yellow + magenta (max contrast pair)
  8:  ['#00ff99'],               // octagram — electric green
  12: ['#ff6600'],               // dodecagram — vivid orange
};

function getStarSectors(numPoints, rotationDeg = 0) {
  // Vertex spoke angles — used as fallback for inner rings
  const rotOffset = (rotationDeg / 360) * CFG.numSectors;
  const sectors = [];
  for (let k = 0; k < numPoints; k++) {
    sectors.push(Math.round(k * CFG.numSectors / numPoints + rotOffset) % CFG.numSectors);
  }
  return sectors;
}

function getStarEdgeIntersections(numPoints, ringR, rotationDeg = 0, starRadius = DATA_RADIUS) {
  // Returns [{x, y, sector}] where a star polygon's edges cross a circle of radius ringR.
  // starRadius sets how large this iteration of the star is.
  const rotRad = rotationDeg * Math.PI / 180;

  const verts = Array.from({ length: numPoints }, (_, k) => {
    const a = k * (2 * Math.PI / numPoints) + rotRad;
    return { x: starRadius * Math.sin(a), y: -starRadius * Math.cos(a) };
  });

  const edges = [];
  if (numPoints === 6) {
    [[0,2,4],[1,3,5]].forEach(tri => {
      for (let i = 0; i < tri.length; i++)
        edges.push([verts[tri[i]], verts[tri[(i+1) % tri.length]]]);
    });
  } else {
    for (let k = 0; k < numPoints; k++)
      edges.push([verts[k], verts[(k+1) % numPoints]]);
  }

  const hits = [];
  for (const [A, B] of edges) {
    const dx = B.x - A.x, dy = B.y - A.y;
    const a = dx*dx + dy*dy;
    const b = 2*(A.x*dx + A.y*dy);
    const c = A.x*A.x + A.y*A.y - ringR*ringR;
    const disc = b*b - 4*a*c;
    if (disc < 0) continue;
    const sq = Math.sqrt(disc);
    for (const sign of [-1, 1]) {
      const t = (-b + sign * sq) / (2 * a);
      if (t < 0 || t > 1) continue;
      const x = A.x + t*dx, y = A.y + t*dy;
      const angle  = ((Math.atan2(x, -y) % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      const sector = Math.round(angle / SECTOR_ANGLE) % CFG.numSectors;
      hits.push({ x: CX + x, y: CY + y, sector });
    }
  }

  // Only return real geometric intersections — no fallback dots.
  // If ringR < inradius the ring is inside the polygon and correctly produces no hits.
  // If ringR > circumradius the ring is outside and also correctly produces no hits.
  return hits;
}

function getAllStarIntersections(numPoints, ringR, rotationDeg, iterations) {
  const stepped = document.getElementById('starRotateToggle')?.classList.contains('active');
  const rotStep = 360 / iterations;
  const hits    = [];
  for (let iter = 0; iter < iterations; iter++) {
    const starRadius = DATA_RADIUS * (iter + 1) / iterations;
    const iterRot    = rotationDeg + (stepped ? iter * rotStep : 0);
    const iterHits   = getStarEdgeIntersections(numPoints, ringR, iterRot, starRadius);
    hits.push(...iterHits);
  }
  return hits;
}

function drawStarOverlay(svg, numPoints, iterations = 2) {
  svg.selectAll('g.star-overlay').remove();
  const g      = svg.append('g').attr('class', 'star-overlay');
  const colors = STAR_COLORS[numPoints] || ['#fff'];

  const vertAt = (s, r) => {
    const theta = s * SECTOR_ANGLE;
    return [CX + r * Math.sin(theta), CY - r * Math.cos(theta)];
  };

  const groups = numPoints === 6
    ? [[0,2,4],[1,3,5]]
    : [Array.from({ length: numPoints }, (_, i) => i)];

  // Draw each nested iteration — stepped rotation + stepped radius
  const stepped = document.getElementById('starRotateToggle')?.classList.contains('active');
  const rotStep = 360 / iterations;
  for (let iter = iterations - 1; iter >= 0; iter--) {
    const r           = DATA_RADIUS * (iter + 1) / iterations;
    const iterRot     = stepped ? iter * rotStep : 0;
    const isOuter     = iter === iterations - 1;
    const opacity     = isOuter ? 1 : 0.35 + (iter / iterations) * 0.4;
    const strokeWidth = isOuter ? 3.5 : 1.2 + (iter / iterations) * 1.5;
    const verts       = getStarSectors(numPoints, iterRot).map(s => vertAt(s, r));

    groups.forEach((indices, gi) => {
      const pts = indices.map(i => verts[i].join(',')).join(' ');
      g.append('polygon')
        .attr('points', pts)
        .attr('fill', 'none')
        .attr('stroke', colors[gi % colors.length])
        .attr('stroke-width', strokeWidth)
        .attr('opacity', opacity)
        .attr('filter', isOuter ? 'drop-shadow(0 0 2px rgba(255,255,255,0.8))' : null);
    });
  }

  // Spokes and vertex dots on outermost iteration only
  const outerVerts = getStarSectors(numPoints).map(s => vertAt(s, DATA_RADIUS));
  outerVerts.forEach(([x, y]) => {
    g.append('line')
      .attr('x1', CX).attr('y1', CY).attr('x2', x).attr('y2', y)
      .attr('stroke', '#aaa').attr('stroke-width', 1.2).attr('opacity', 0.4);
  });
  outerVerts.forEach(([x, y], i) => {
    g.append('circle').attr('cx', x).attr('cy', y).attr('r', 3)
      .attr('fill', colors[Math.floor(i / (numPoints / groups.length)) % colors.length])
      .attr('opacity', 0.8);
  });
}

// ── Dataset catalogue ────────────────────────────────────────────────
const DATASETS = [
  { id: 'pr_wtr_cached', label: 'Water Vapor · Cached', dataMin: 0, dataMax: 70,  unit: 'kg/m²' },
  { id: 'pr_wtr_live',   label: 'Water Vapor · Live',   dataMin: 0, dataMax: 70,  unit: 'kg/m²' },
  { id: 'rhum_live',     label: 'Humidity · Live',      dataMin: 0, dataMax: 100, unit: '%'      },
  { id: 'seismic_live',  label: 'Seismic · Live',       dataMin: 0, dataMax: 9,   unit: 'Mw'    },
];

// ── Mapping layer ────────────────────────────────────────────────────
// The heart of the engine: one normalized value → color + frequency.
// Everything passes through here regardless of data source.

function normalize(value, min = CFG.dataMin, max = CFG.dataMax) {
  return Math.max(0, Math.min(1, (value - min) / (max - min)));
}

function normToColor(norm, ring = 0, sector = 0) {
  // oklch — perceptually uniform color space, reaches P3 wide-gamut on modern displays.
  // L = lightness (0-1), C = chroma/vividness (0-~0.37), H = hue angle (0-360°)

  // Hue: full 360° wheel, offset so dry polar air = violet/indigo,
  // moderate moisture = teal/gold/amber, deep tropics = magenta/rose.
  // Using the full circle gives every color family a role — not just a rainbow strip.
  const hueBase = (260 + norm * 360) % 360;

  // Organic per-cell variation — breaks up uniform banding, feels hand-made.
  // Each ring drifts slightly (like concentric color layers in her drawings).
  // Each longitude column has a gentle wave, visible as soft radial texture.
  const ringDrift  = Math.sin((ring  / CFG.numRings)  * Math.PI * 2.2) * 20;
  const sectorWave = Math.sin(sector * SECTOR_ANGLE   * 3.1)            * 14;

  const hue = (hueBase + ringDrift + sectorWave + 360) % 360;

  // Chroma: peak in the tropical/mid-moisture band where data is richest.
  // Poles and extreme-dry air are paler (less chroma = more pastel/icy).
  const chroma = 0.06 + 0.26 * Math.pow(Math.sin(norm * Math.PI), 0.65);

  // Lightness: slight arc — darkest at extremes, brightest in the mid-range.
  const lightness = 0.28 + norm * 0.30 + 0.10 * Math.sin(norm * Math.PI);

  return `oklch(${lightness.toFixed(3)} ${chroma.toFixed(3)} ${hue.toFixed(1)})`;
}

// Scale definitions — semitone offsets from root (C)
const SCALES = {
  pentatonic: [0, 2, 4, 7, 9],           // C major pentatonic — always consonant
  diatonic:   [0, 2, 4, 5, 7, 9, 11],    // C major
  chromatic:  null,                        // all 12 semitones
  continuous: null,                        // no quantization
};

function normToFreq(norm, scaleKey = 'pentatonic') {
  const scale = SCALES[scaleKey];

  if (scaleKey === 'continuous') {
    return CFG.minFreq * Math.pow(CFG.maxFreq / CFG.minFreq, norm);
  }

  if (scaleKey === 'chromatic') {
    const step = Math.round(24 * norm); // 2 octaves of 12 semitones
    return CFG.minFreq * Math.pow(2, step / 12);
  }

  // Pentatonic / diatonic: map norm across 2 octaves of scale degrees
  const totalNotes = scale.length * 2; // e.g. pentatonic = 10 notes over 2 octaves
  const idx     = Math.round(norm * (totalNotes - 1));
  const octave  = Math.floor(idx / scale.length);
  const degree  = idx % scale.length;
  const semitone = octave * 12 + scale[degree];
  return CFG.minFreq * Math.pow(2, semitone / 12);
}

// ── SVG Grid substrate ───────────────────────────────────────────────
// The "polar paper" — always visible beneath the data cells.

function drawSubstrate(svg) {
  const g = svg.append('g').attr('class', 'substrate');

  // Concentric rings (every ring + a few accent rings at key latitudes)
  for (let r = 1; r <= CFG.numRings; r++) {
    g.append('circle')
      .attr('cx', CX).attr('cy', CY)
      .attr('r', r * RING_WIDTH)
      .attr('class', 'grid-ring')
      .attr('stroke-width', r % 6 === 0 ? 0.8 : 0.3); // accent every 15°
  }

  // Outer boundary rings (the breathing-room zone)
  const outerRings = 4;
  const outerStep  = (MAX_RADIUS - DATA_RADIUS) / outerRings;
  for (let i = 1; i <= outerRings; i++) {
    g.append('circle')
      .attr('cx', CX).attr('cy', CY)
      .attr('r', DATA_RADIUS + i * outerStep)
      .attr('class', 'grid-ring')
      .attr('stroke-width', 0.25);
  }

  // Radial spokes — every 5 sectors (every 12.5°), full length
  for (let s = 0; s < CFG.numSectors; s += 5) {
    const angle = s * SECTOR_ANGLE - Math.PI / 2;
    g.append('line')
      .attr('class', 'grid-spoke')
      .attr('x1', CX).attr('y1', CY)
      .attr('x2', CX + MAX_RADIUS * Math.cos(angle))
      .attr('y2', CY + MAX_RADIUS * Math.sin(angle))
      .attr('stroke-width', s % 30 === 0 ? 0.7 : 0.25); // accent every 75° (~cardinal)
  }
}

// ── Grid render ──────────────────────────────────────────────────────

const arcGen = d3.arc();

function cellPath(ring, sector) {
  return arcGen({
    innerRadius: ring * RING_WIDTH + CFG.cellPadRadius,
    outerRadius: (ring + 1) * RING_WIDTH - CFG.cellPadRadius,
    startAngle:  sector * SECTOR_ANGLE + CFG.cellPadAngle,
    endAngle:    (sector + 1) * SECTOR_ANGLE - CFG.cellPadAngle,
  });
}

function renderCells(svg, gridCells, opts = {}) {
  const { wave = 'sine', scale = 'pentatonic' } = opts;

  const g = svg.selectAll('g.cells').data([null]).join('g')
    .attr('class', 'cells')
    .attr('transform', `translate(${CX},${CY})`);

  g.selectAll('path.cell')
    .data(gridCells, d => `${d.ring}-${d.sector}`)
    .join('path')
      .attr('class', 'cell')
      .attr('d', d => cellPath(d.ring, d.sector))
      .attr('fill', d => d.color)
      .on('mouseenter', (event, d) => showTooltip(event, d))
      .on('mouseleave', () => hideTooltip())
      .on('click', (event, d) => {
        playTone(normToFreq(d.norm, scale), { wave, volume: 0.3 });
      });
}

// ── Tooltip ──────────────────────────────────────────────────────────

function showTooltip(event, d) {
  const tip   = document.getElementById('tooltip');
  const scale = document.getElementById('scaleSelect').value;
  const freq  = normToFreq(d.norm, scale).toFixed(1);
  tip.innerHTML =
    `lat ${d.lat > 0 ? '+' : ''}${d.lat.toFixed(1)}°&nbsp; lon ${d.lon.toFixed(1)}°<br>` +
    `${d.value.toFixed(1)} kg/m²&nbsp;&nbsp;${freq} Hz`;
  tip.style.opacity = '1';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 10) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.opacity = '0';
}

// ── ERDDAP ingestion adapter ─────────────────────────────────────────
// Converts NOAA ERDDAP esrlNcepRe rows → normalized GridCell[]

async function fetchLatestERDDAPDate() {
  const res = await fetch('https://coastwatch.pfeg.noaa.gov/erddap/info/esrlNcepRe/index.json');
  if (!res.ok) throw new Error(`metadata HTTP ${res.status}`);
  const json = await res.json();
  const rows = json.table.rows;
  for (const row of rows) {
    if (row.includes('time_coverage_end')) {
      // row is [rowType, variableName, attributeName, dataType, value]
      const val = row[row.length - 1];
      return val.split('T')[0]; // "2026-03-17"
    }
  }
  throw new Error('time_coverage_end not found in metadata');
}

async function fetchERDDAP(date, variable = 'pr_wtr', level = null) {
  const lvl = level != null ? `[(${level})]` : '';
  const url = `https://coastwatch.pfeg.noaa.gov/erddap/griddap/esrlNcepRe.json` +
    `?${variable}[(${date})]${lvl}[(90):(-90)][(0):(357.5)]`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  return json.table.rows;
}

async function fetchUSGSSeismic() {
  // 2.5+ magnitude, last 30 days — smaller feed, all events have valid geometry
  const url = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_month.geojson';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  return json.features;
}

function erddapRowsToGrid(rows, { dataMin = CFG.dataMin, dataMax = CFG.dataMax, latCol = 1, lonCol = 2, valCol = 3 } = {}) {
  const cells = [];
  for (const row of rows) {
    const lat = row[latCol], lon = row[lonCol], value = row[valCol];
    if (value == null || value < -900) continue;

    // Map lat (90 → -90) to ring (0 → 72)
    const ring   = Math.round((90 - lat) / (180 / (CFG.numRings - 1)));
    // Map lon (0 → 357.5) to sector (0 → 143)
    const sector = Math.round(lon / (360 / CFG.numSectors)) % CFG.numSectors;

    const norm  = normalize(value, dataMin, dataMax);
    const color = normToColor(norm, ring, sector);

    cells.push({ ring, sector, norm, color, value, lat, lon });
  }
  return cells;
}

function usgsFeaturesToGrid(features) {
  // Accumulate max magnitude per grid cell
  const cellMag = new Map();
  for (const f of features) {
    if (!f.geometry || !f.geometry.coordinates) continue;
    const [lon, lat] = f.geometry.coordinates;
    const mag = f.properties.mag;
    if (mag == null || mag < 0) continue;
    const ring   = Math.round((90 - lat) / (180 / (CFG.numRings - 1)));
    const sector = Math.round(((lon % 360) + 360) % 360 / (360 / CFG.numSectors)) % CFG.numSectors;
    const key = `${ring}-${sector}`;
    cellMag.set(key, Math.max(cellMag.get(key) ?? 0, mag));
  }

  const cells = [];
  for (const [key, value] of cellMag) {
    const [ring, sector] = key.split('-').map(Number);
    const lat = 90 - ring * (180 / (CFG.numRings - 1));
    const lon = sector * (360 / CFG.numSectors);
    const norm  = normalize(value, 0, 9);
    const color = normToColor(norm, ring, sector);
    cells.push({ ring, sector, norm, color, value, lat, lon });
  }
  return cells;
}

// ── Demo data (fallback if ERDDAP is unreachable) ────────────────────

function generateDemoGrid() {
  const cells = [];
  for (let ring = 0; ring < CFG.numRings; ring++) {
    for (let sector = 0; sector < CFG.numSectors; sector++) {
      const lat = 90 - ring * (180 / (CFG.numRings - 1));
      const lon = sector * (360 / CFG.numSectors);

      // Physically plausible: peak moisture near equator, low at poles
      const latRad   = lat * Math.PI / 180;
      const lonRad   = lon * Math.PI / 180;
      const equBand  = Math.pow(Math.cos(latRad), 2.5) * 55;  // ITCZ
      const waviness = 8 * Math.sin(lonRad * 3) * Math.cos(latRad);
      const noise    = (Math.random() - 0.5) * 6;
      const value    = Math.max(0, Math.min(70, equBand + waviness + noise));

      const norm  = normalize(value);
      const color = normToColor(norm, ring, sector);
      cells.push({ ring, sector, norm, color, value, lat, lon });
    }
  }
  return cells;
}

// ── Playback modes ────────────────────────────────────────────────────

let playState = { running: false, timer: null };

function startPlayback(gridCells, opts = {}) {
  const mode = parseInt(document.getElementById('modeSelect').value);
  if (mode === 1) return startMode1(gridCells, opts);
  if (mode === 2) return startMode2(gridCells, opts);
}

// ── Mode 1: Ring Portraits ────────────────────────────────────────────
// Each ring fires as a simultaneous chord — an amalgamation of its entire
// latitude band, sampled at star edge intersections. Rings sustain into
// each other, spiraling outward from pole to tropics to pole.

function startMode1(gridCells, opts = {}) {
  const { wave = 'sine', scale = 'pentatonic', stepMs = 800, numStarPoints = 6, starIterations = 2 } = opts;

  // Group cells by ring
  const byRing = new Map();
  for (const cell of gridCells) {
    if (!byRing.has(cell.ring)) byRing.set(cell.ring, []);
    byRing.get(cell.ring).push(cell);
  }
  const rings = [...byRing.keys()].sort((a, b) => a - b);

  const svg = d3.select('#viz');

  // Ring pulse indicator — on top of everything else
  svg.selectAll('circle.ring-indicator').remove();
  const indicator = svg.append('circle')
    .attr('class', 'ring-indicator')
    .attr('cx', CX).attr('cy', CY)
    .attr('fill', 'none')
    .attr('stroke', 'transparent')
    .attr('pointer-events', 'none')
    .attr('r', 0);

  let i = 0;
  let rotationDeg = 0;
  const rotPerRing = 360 / rings.length; // one full rotation over the entire playback

  playState.running = true;

  function step() {
    if (!playState.running || i >= rings.length) {
      stopPlayback();
      return;
    }

    const ring  = rings[i];
    const ringR = (ring + 0.5) * RING_WIDTH;

    // Rotate the star overlay — visual rotation synced to ring progression
    d3.select('#viz g.star-overlay')
      .attr('transform', `rotate(${rotationDeg}, ${CX}, ${CY})`);

    // Ring: bright flash on hit, bloom and fade
    // Inner rings (north pole, no data) get yellow so they're visible against the background
    const progress   = Math.min(1, ringR / DATA_RADIUS);
    const flashR     = 255;
    const flashG     = Math.round(230 + progress * 25);   // 230 → 255 (yellow → white)
    const flashB     = Math.round(progress * 255);         // 0   → 255 (yellow → white)
    const flashColor = `rgba(${flashR},${flashG},${flashB},0.95)`;
    const midColor   = progress < 0.3
      ? 'rgba(200,150,0,0.65)'       // amber hold for inner rings
      : 'rgba(100,70,220,0.70)';     // purple hold for outer rings
    // Widen stroke on small rings so they stay legible
    const strokeW    = Math.max(RING_WIDTH * 2.2, RING_WIDTH * 1.4);

    indicator
      .interrupt()
      .attr('r', ringR)
      .attr('stroke', flashColor)
      .attr('stroke-width', strokeW)
      .transition().duration(stepMs * 0.15).ease(d3.easeQuadOut)
        .attr('stroke', midColor)
        .attr('stroke-width', RING_WIDTH * 1.1)
      .transition().duration(stepMs * 1.1).ease(d3.easeCubicOut)
        .attr('stroke', 'rgba(80,50,180,0)')
        .attr('stroke-width', RING_WIDTH * 0.3);

    // Find where ALL nested star iterations cross this ring
    const cells         = byRing.get(ring) || [];
    const cellBySector  = new Map(cells.map(c => [c.sector, c]));
    let intersections = getAllStarIntersections(numStarPoints, ringR, rotationDeg, starIterations);

    // Innermost rings may be inside the star — no edge crossings.
    // Fall back to vertex-aligned sectors so every ring still sounds.
    if (intersections.length === 0) {
      intersections = getStarSectors(numStarPoints, rotationDeg).map(sector => {
        const angle = sector * SECTOR_ANGLE;
        return { x: CX + ringR * Math.sin(angle), y: CY - ringR * Math.cos(angle), sector };
      });
    }
    const sample = intersections
      .map(({ sector: s }) => cellBySector.get(s) || cells.reduce((a, b) =>
        Math.abs(a.sector - s) < Math.abs(b.sector - s) ? a : b))
      .filter(Boolean);
    const noteDur   = (stepMs / 1000) * 2.8;
    // Normalize volume so total output stays constant regardless of intersection count
    const voiceCount = Math.max(1, sample.length);
    const volPerVoice = Math.min(0.15, 0.6 / voiceCount);

    // Sparks fire exactly where the star lines cross this ring
    const sparkColors = STAR_COLORS[numStarPoints] || ['#ffffff'];
    intersections.forEach(({ x: vx, y: vy }, idx) => {
      const cell = sample[idx];
      const brightness = (cell ? 2 + cell.norm * 4 : 2.5);

      svg.append('circle')
        .attr('cx', vx).attr('cy', vy)
        .attr('r', brightness)
        .attr('fill', 'white')
        .attr('opacity', 1)
        .transition().duration(stepMs * 0.25).ease(d3.easeQuadOut)
          .attr('r', brightness * 1.4)
        .transition().duration(stepMs * 0.9).ease(d3.easeCubicOut)
          .attr('opacity', 0)
          .attr('r', brightness * 0.5)
          .remove();
    });

    sample.forEach(cell => {
      const freq = normToFreq(cell.norm, scale);
      const vol  = volPerVoice * (0.5 + cell.norm * 0.5); // wetter = slightly louder within budget
      playTone(freq, { duration: noteDur, wave, volume: vol });
    });

    i++;
    rotationDeg += rotPerRing;
    playState.timer = setTimeout(step, stepMs);
  }

  step();
}

function stopPlayback() {
  playState.running = false;
  clearTimeout(playState.timer);

  // Fade and stop any persistent voices (Mode 2)
  if (playState.voices) {
    const ctx = audioCtx();
    playState.voices.forEach(({ osc, gain }) => {
      gain.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
      osc.stop(ctx.currentTime + 0.3);
    });
    playState.voices = null;
  }

  d3.select('#viz').selectAll('circle.ring-indicator')
    .interrupt()
    .attr('stroke', 'transparent');

  d3.select('#viz g.star-overlay')
    .attr('transform', `rotate(0, ${CX}, ${CY})`);

  d3.select('#viz line.sweep-line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',0);
  d3.select('#viz line.anti-line') .attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',0);

  document.getElementById('playBtn').textContent = '▶\u00a0 Play Earth';
  document.getElementById('playBtn').classList.remove('playing');
}

// ── Mode 2: Antipodal Sweep ───────────────────────────────────────────
// Clockwise ring-by-ring spiral. At each sector step, plays the current
// cell + its antipodal cell (180° opposite). Two voices per step, always
// paired across the globe. 12:01↔6:31, 12:02↔6:32, 3:01↔9:01 etc.

function startMode2(gridCells, opts = {}) {
  const { wave = 'sine', scale = 'pentatonic', stepMs = 800 } = opts;

  const numVoices = parseInt(document.getElementById('voiceCount').value);
  const cascade   = document.getElementById('voiceLayout').value === 'cascade';

  const cellMs = Math.max(20, Math.round(stepMs / 8));

  // Build ring → sector → cell lookup
  const byRing = new Map();
  for (const cell of gridCells) {
    if (!byRing.has(cell.ring)) byRing.set(cell.ring, new Map());
    byRing.get(cell.ring).set(cell.sector, cell);
  }
  const rings = [...byRing.keys()].sort((a, b) => a - b);

  // Angle offsets: evenly divide 360° into numVoices
  const offsets = Array.from({ length: numVoices }, (_, i) =>
    Math.round(i * CFG.numSectors / numVoices)
  );

  // Build steps: every sector of every ring — voices may be null for sparse datasets.
  // Never filter by data presence so the sweep line is always moving.
  const steps = [];
  for (const ring of rings) {
    for (let s = 0; s < CFG.numSectors; s++) {
      const voices = offsets.map((offset, vi) => {
        const sec  = (s + offset) % CFG.numSectors;
        const r    = cascade ? rings[Math.min(rings.indexOf(ring) + vi, rings.length - 1)] : ring;
        const rMap = byRing.get(r);
        return rMap ? (rMap.get(sec) ?? null) : null;
      });
      steps.push({ ring, s, voices });
    }
  }

  const svg = d3.select('#viz');

  // Sweep line rotates clockwise with the sector
  const sweepLine = svg.selectAll('line.sweep-line').data([null]).join('line')
    .attr('class', 'sweep-line')
    .attr('stroke', 'rgba(255,255,255,0.4)')
    .attr('stroke-width', 1)
    .attr('pointer-events', 'none');

  // Antipodal sweep line (always 180° opposite)
  const antiLine = svg.selectAll('line.anti-line').data([null]).join('line')
    .attr('class', 'anti-line')
    .attr('stroke', 'rgba(255,220,0,0.3)')
    .attr('stroke-width', 1)
    .attr('pointer-events', 'none');

  const useGlide = document.getElementById('voiceMode').dataset.mode !== 'pulse';

  // Two persistent oscillators — frequency glides continuously, no gaps or restarts
  const ctx   = audioCtx();
  const glide = cellMs / 1000 * 0.8;

  function makeVoice(startFreq, vol, panPos = 0, detuneCents = 0) {
    const osc   = ctx.createOscillator();
    const gain  = ctx.createGain();
    const panner = ctx.createStereoPanner();

    if (wave === 'sine') {
      osc.type = 'sine';
    } else if (WAVE_PARTIALS[wave]) {
      if (!_waves[wave]) {
        const { real, imag } = WAVE_PARTIALS[wave];
        _waves[wave] = ctx.createPeriodicWave(
          new Float32Array(real), new Float32Array(imag), { disableNormalization: false }
        );
      }
      osc.setPeriodicWave(_waves[wave]);
    } else {
      osc.type = 'sine';
    }

    osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
    osc.detune.setValueAtTime(detuneCents, ctx.currentTime);
    panner.pan.setValueAtTime(panPos, ctx.currentTime);

    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.04);

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(_masterOut);
    osc.start();
    return { osc, gain, panner };
  }

  // Pan positions spread evenly across stereo field, detune alternates +/-
  const panPositions   = numVoices === 1 ? [0]
    : offsets.map((_, i) => -0.7 + (i / (numVoices - 1)) * 1.4);
  const detuneAmounts  = offsets.map((_, i) => (i % 2 === 0 ? 1 : -1) * (i + 1) * 3);

  // Initialise persistent oscillators for glide mode.
  // Use a neutral mid-frequency as start; first real cell will immediately glide it.
  const GLIDE_FADE_S = 2.5; // seconds of no data before voice fades to silence
  let liveVoices = [];
  if (useGlide && steps.length > 0) {
    liveVoices = offsets.map((_, vi) => {
      const v = makeVoice(normToFreq(0.5, scale), 0.6 / numVoices, panPositions[vi], detuneAmounts[vi]);
      v.lastDataAt = ctx.currentTime;
      v.faded = false;
      return v;
    });
    playState.voices = liveVoices;
  }

  let i = 0;
  playState.running = true;

  function step() {
    if (!playState.running || i >= steps.length) {
      stopPlayback();
      return;
    }

    const { ring, s, voices } = steps[i];
    const ringIdx = rings.indexOf(ring);

    // Audio — only fire for voices that actually have cell data
    if (useGlide) {
      const t = ctx.currentTime;
      voices.forEach((cell, vi) => {
        const lv = liveVoices[vi];
        if (!lv) return;
        if (cell) {
          // Data present — update frequency, restore gain if faded
          lv.osc.frequency.setTargetAtTime(normToFreq(cell.norm, scale), t, glide);
          if (lv.faded) {
            lv.gain.gain.setTargetAtTime(0.6 / numVoices, t, 0.15);
            lv.faded = false;
          }
          lv.lastDataAt = t;
        } else {
          // No data — fade out after GLIDE_FADE_S seconds of silence
          if (!lv.faded && t - lv.lastDataAt > GLIDE_FADE_S) {
            lv.gain.gain.setTargetAtTime(0, t, 0.4);
            lv.faded = true;
          }
        }
      });
    } else {
      const noteDur = cellMs / 1000 * 3.5;
      voices.forEach(cell => {
        if (cell)
          playTone(normToFreq(cell.norm, scale), { duration: noteDur, wave, volume: 0.5 / numVoices });
      });
    }

    // Voice positions — always computable from sector angle, cell may be null
    const voicePos = offsets.map((offset, vi) => {
      const sec = (s + offset) % CFG.numSectors;
      const angle = sec * SECTOR_ANGLE;
      const voiceRing = cascade
        ? rings[Math.min(ringIdx + vi, rings.length - 1)]
        : ring;
      const voiceR = (voiceRing + 0.5) * RING_WIDTH;
      return { vx: CX + voiceR * Math.sin(angle), vy: CY - voiceR * Math.cos(angle), cell: voices[vi] ?? null };
    });

    // Sweep lines — always update so indicator is visible even over empty cells
    sweepLine.attr('x1', CX).attr('y1', CY)
      .attr('x2', voicePos[0].vx).attr('y2', voicePos[0].vy);
    if (voicePos[1])
      antiLine.attr('x1', CX).attr('y1', CY)
        .attr('x2', voicePos[1].vx).attr('y2', voicePos[1].vy);

    // Edges between adjacent voices — only where both endpoints have data
    if (numVoices > 1) {
      for (let vi = 0; vi < voicePos.length; vi++) {
        const a = voicePos[vi];
        const b = voicePos[(vi + 1) % voicePos.length];
        if (!a.cell || !b.cell) continue;
        svg.append('line')
          .attr('x1', a.vx).attr('y1', a.vy)
          .attr('x2', b.vx).attr('y2', b.vy)
          .attr('stroke', 'white')
          .attr('stroke-width', 1)
          .attr('opacity', 0.55)
          .attr('pointer-events', 'none')
          .transition().duration(cellMs * 4).ease(d3.easeCubicOut)
            .attr('opacity', 0)
            .remove();
      }
    }

    // Sparks — only where cell has data
    voicePos.forEach(({ vx, vy, cell }) => {
      if (!cell) return;
      const r = 2 + cell.norm * 3;
      svg.append('circle')
        .attr('cx', vx).attr('cy', vy).attr('r', r)
        .attr('fill', 'white').attr('opacity', 0.8)
        .transition().duration(cellMs * 4).ease(d3.easeCubicOut)
          .attr('opacity', 0).attr('r', r * 0.4)
          .remove();
    });

    i++;
    playState.timer = setTimeout(step, cellMs);
  }

  step();
}

// ── Bootstrap ────────────────────────────────────────────────────────

async function main() {
  const svg = d3.select('#viz')
    .attr('width', CFG.size)
    .attr('height', CFG.size);

  drawSubstrate(svg);

  const getOpts = () => ({
    wave:           document.getElementById('waveSelect').value,
    scale:          document.getElementById('scaleSelect').value,
    stepMs:         parseInt(document.getElementById('speedSelect').value),
    numStarPoints:  parseInt(document.getElementById('starSelect').value),
    starIterations: parseInt(document.getElementById('starIterations').value) || 2,
  });

  const redrawStar = () => {
    const o = getOpts();
    drawStarOverlay(svg, o.numStarPoints, o.starIterations);
  };

  async function loadDataset(id) {
    stopPlayback();
    const ds = DATASETS.find(d => d.id === id);
    if (!ds) return;
    currentDataset = id;
    CFG.dataMin = ds.dataMin;
    CFG.dataMax = ds.dataMax;
    setStatus(`Loading ${ds.label}…`);

    try {
      if (id === 'pr_wtr_cached') {
        if (!window.WATER_VAPOR_DATA) throw new Error('No cached data');
        const { date, rows } = window.WATER_VAPOR_DATA;
        gridCells = erddapRowsToGrid(rows, { dataMin: ds.dataMin, dataMax: ds.dataMax });
        setStatus(`${gridCells.length.toLocaleString()} cells · ${date} · ${ds.label}`);

      } else if (id === 'pr_wtr_live') {
        const date = await fetchLatestERDDAPDate();
        const rows = await fetchERDDAP(date, 'pr_wtr');
        gridCells = erddapRowsToGrid(rows, { dataMin: ds.dataMin, dataMax: ds.dataMax });
        setStatus(`${gridCells.length.toLocaleString()} cells · ${date} · ${ds.label}`);

      } else if (id === 'rhum_live') {
        const date = await fetchLatestERDDAPDate();
        const rows = await fetchERDDAP(date, 'rhum', '1000.0');
        gridCells = erddapRowsToGrid(rows, { dataMin: ds.dataMin, dataMax: ds.dataMax, latCol: 2, lonCol: 3, valCol: 4 });
        setStatus(`${gridCells.length.toLocaleString()} cells · ${date} · ${ds.label}`);

      } else if (id === 'seismic_live') {
        const features = await fetchUSGSSeismic();
        gridCells = usgsFeaturesToGrid(features);
        setStatus(`${gridCells.length.toLocaleString()} active cells · last 30 days · ${ds.label}`);
      }
    } catch (err) {
      console.warn(`Dataset "${id}" failed:`, err.message);
      // Fall back: try cached water vapor, else synthetic demo
      if (window.WATER_VAPOR_DATA) {
        CFG.dataMin = 0; CFG.dataMax = 70;
        const { date, rows } = window.WATER_VAPOR_DATA;
        gridCells = erddapRowsToGrid(rows, { dataMin: 0, dataMax: 70 });
        document.getElementById('datasetSelect').value = 'pr_wtr_cached';
        currentDataset = 'pr_wtr_cached';
        setStatus(`Load failed (${err.message}) — using cached water vapor`);
      } else {
        CFG.dataMin = 0; CFG.dataMax = 70;
        gridCells = generateDemoGrid();
        document.getElementById('datasetSelect').value = 'pr_wtr_cached';
        currentDataset = 'pr_wtr_cached';
        setStatus(`Load failed — showing demo pattern`);
      }
    }

    renderCells(svg, gridCells, getOpts());
    const mode = parseInt(document.getElementById('modeSelect').value);
    if (mode === 1) redrawStar();
  }

  // Initial load: prefer cached, fall back to demo if no bundled data
  const initialId = window.WATER_VAPOR_DATA ? 'pr_wtr_cached' : 'pr_wtr_cached';
  document.getElementById('datasetSelect').value = initialId;
  await loadDataset(initialId);

  document.getElementById('datasetSelect').addEventListener('change', e => loadDataset(e.target.value));

  ['waveSelect', 'scaleSelect'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => renderCells(svg, gridCells, getOpts()));
  });

  document.getElementById('starSelect').addEventListener('change', redrawStar);
  document.getElementById('starIterations').addEventListener('change', redrawStar);

  function updateControlVisibility() {
    const mode = parseInt(document.getElementById('modeSelect').value);
    document.getElementById('starControls').style.display = mode === 1 ? 'flex' : 'none';
    document.getElementById('voiceMode').style.display    = mode === 2 ? '' : 'none';
    document.getElementById('mode2Controls').style.display = mode === 2 ? 'flex' : 'none';
    if (mode === 1) {
      redrawStar();
    } else {
      d3.select('#viz g.star-overlay').remove();
    }
  }

  document.getElementById('modeSelect').addEventListener('change', updateControlVisibility);
  updateControlVisibility();

  const voiceBtn = document.getElementById('voiceMode');
  voiceBtn.dataset.mode = 'glide';
  voiceBtn.addEventListener('click', () => {
    const isPulse = voiceBtn.dataset.mode === 'pulse';
    voiceBtn.dataset.mode    = isPulse ? 'glide' : 'pulse';
    voiceBtn.textContent     = isPulse ? 'Glide' : 'Pulse';
    voiceBtn.style.borderColor = isPulse ? '#ccc' : '#7755cc';
    voiceBtn.style.color       = isPulse ? '#777' : '#7755cc';
  });

  const rotToggle = document.getElementById('starRotateToggle');
  rotToggle.addEventListener('click', () => {
    rotToggle.classList.toggle('active');
    rotToggle.textContent = rotToggle.classList.contains('active') ? '↻ Step ✓' : '↻ Step';
    rotToggle.style.borderColor = rotToggle.classList.contains('active') ? '#7755cc' : '#ccc';
    rotToggle.style.color       = rotToggle.classList.contains('active') ? '#7755cc' : '#777';
    redrawStar();
  });

  document.getElementById('playBtn').addEventListener('click', () => {
    if (playState.running) {
      stopPlayback();
    } else {
      document.getElementById('playBtn').textContent = '■\u00a0 Stop';
      document.getElementById('playBtn').classList.add('playing');
      startPlayback(gridCells, getOpts());
    }
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

main();
</script>
</body>
</html>
