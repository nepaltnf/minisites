<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Caddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #080C08;
      --surface:  #111811;
      --surface2: #192019;
      --border:   #223022;
      --text:     #FFFFFF;
      --muted:    #566056;
      --dim:      #2E3E2E;
      --accent:   #AAFF00;
      --green:    #52B788;
      --danger:   #FF453A;
      --font: 'Space Mono', ui-monospace, 'Courier New', monospace;
      --r: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── AUTH ───────────────────────────────── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 32px 24px;
    }
    #auth-screen.hidden { display: none; }

    .auth-mark {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 52px;
    }
    .auth-form {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .auth-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 15px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--r);
      outline: none;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .auth-btn:active { opacity: 0.85; }
    .auth-error {
      font-size: 11px;
      color: var(--danger);
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    /* ── APP SHELL ──────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100svh; }
    #app.visible { display: flex; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
    }
    .app-mark {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .signout-btn {
      font-family: var(--font);
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      padding: 6px 0;
    }
    .signout-btn:active { color: var(--text); }

    /* ── TAB BAR ────────────────────────────── */
    .tab-bar {
      display: flex;
      padding: 14px 20px 0;
      gap: 6px;
    }
    .tab {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--r);
      cursor: pointer;
      transition: none;
    }
    .tab.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }
    .tab-panel { display: none; flex: 1; overflow-y: auto; }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* ── ON COURSE ──────────────────────────── */
    #panel-oncourse {
      padding: 12px 20px calc(40px + env(safe-area-inset-bottom, 0px));
    }

    .hero-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-top: 12px;
      margin-bottom: 8px;
    }

    .hero-input-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    #yardage-input {
      font-family: var(--font);
      font-size: 80px;
      font-weight: 700;
      color: var(--accent);
      background: none;
      border: none;
      outline: none;
      width: 230px;
      text-align: center;
      caret-color: var(--accent);
      -webkit-appearance: none;
      appearance: none;
      line-height: 1;
    }
    #yardage-input::placeholder { color: var(--dim); }

    .hero-unit {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding-bottom: 8px;
    }

    .hero-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 16px 0 20px;
    }

    /* conditions */
    .env-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 0 12px;
      margin-bottom: 16px;
    }
    .env-locate-btn {
      background: none;
      border: none;
      padding: 4px 6px 4px 0;
      cursor: pointer;
      color: var(--accent);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .env-locate-btn.loading { opacity: 0.3; pointer-events: none; }
    .env-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .env-toggle-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .env-toggle-summary {
      flex: 1;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      color: #FF9F0A;
      letter-spacing: 0.06em;
    }
    .env-chevron {
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .env-chevron.open { transform: rotate(180deg); }
    .env-fields {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }
    .env-fields.open {
      max-height: 90px;
      padding-bottom: 12px;
    }
    .conditions {
      display: flex;
      gap: 10px;
    }
    .cond-field { flex: 1; }
    .cond-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .cond-input {
      width: 100%;
      height: 44px;
      font-family: var(--font);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px 12px;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
    }
    .cond-input:focus { border-color: var(--accent); }

    .hurt-stepper {
      display: flex;
      align-items: stretch;
      height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .hurt-step-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      background: none;
      border: none;
      padding: 0 12px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
      line-height: 1;
    }
    .hurt-step-btn:active { background: var(--surface2); color: var(--text); }
    .hurt-step-val {
      flex: 1;
      text-align: center;
      font-family: var(--font);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      pointer-events: none;
    }
    .hurt-step-val.active { color: #FF9F0A; }

    /* ── CADDY RESULT ───────────────────────── */
    #caddy-result { display: none; }
    #caddy-result.visible { display: block; }

    .effective-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .effective-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .effective-yds {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .effective-unit {
      font-size: 11px;
      color: var(--muted);
      margin-left: 2px;
      font-weight: 400;
    }
    .effective-adj {
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.04em;
    }

    .caddy-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .caddy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px 14px;
    }
    .caddy-card.commit { border-color: var(--accent); }

    .card-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .caddy-card.commit .card-badge { color: var(--accent); }

    .card-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .card-club {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .card-carry {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }
    .caddy-card.alt .card-carry { color: var(--green); }

    .card-sub {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-swing {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .card-diff {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .card-diff.exact { color: var(--accent); }
    .card-diff.long  { color: #FF9F0A; }
    .card-diff.short { color: var(--muted); }

    .card-approach {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .card-approach.full  { color: var(--accent); }
    .card-approach.close { color: #FF9F0A; }

    .caddy-card { cursor: pointer; }
    .swing-options-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .swing-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .swing-opt-label { color: var(--muted); flex: 1; letter-spacing: 0.04em; }
    .swing-opt-carry { font-weight: 700; color: var(--text); min-width: 32px; text-align: right; }
    .swing-opt-diff  { font-size: 11px; min-width: 64px; text-align: right; letter-spacing: 0.03em; }
    .swing-opt-diff.exact { color: var(--accent); }
    .swing-opt-diff.long  { color: #FF9F0A; }
    .swing-opt-diff.short { color: var(--muted); }
    .swing-option.current .swing-opt-label { color: var(--text); font-weight: 700; }
    .card-expand-toggle {
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .no-clubs-prompt {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      line-height: 1.9;
      padding: 32px 0;
    }

    /* ── YARDAGES TAB ───────────────────────── */
    #panel-yardages {
      padding: 20px 20px calc(80px + env(safe-area-inset-bottom, 0px));
    }

    .section-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .add-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 9px 14px;
      border-radius: var(--r);
      cursor: pointer;
      text-transform: uppercase;
    }
    .add-btn:active { opacity: 0.8; }

    .club-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .club-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .club-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .club-name-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .club-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .club-type-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--bg);
      background: var(--muted);
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .club-edit-btn {
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 4px;
    }
    .club-edit-btn:active { color: var(--accent); }
    .club-set-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .club-swings {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 14px;
    }
    .swing-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      min-width: 80px;
    }
    .swing-cell-label {
      font-size: 8px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .swing-cell-carry {
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }
    .carry-full    { color: var(--accent); }
    .carry-partial { color: var(--green); }
    .carry-hard    { color: var(--muted); }
    .swing-cell-carry:active { opacity: 0.7; }
    .swing-carry-input {
      font-family: var(--font);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      background: none;
      border: none;
      border-bottom: 1px solid var(--accent);
      outline: none;
      width: 70px;
      -webkit-appearance: none;
    }

    .empty-state {
      text-align: center;
      padding: 52px 20px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      line-height: 2;
    }

    /* ── MODAL ──────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      padding: 24px 20px calc(32px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 500px;
      max-height: 92svh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .modal-field { margin-bottom: 16px; }

    .modal-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .modal-input, .modal-select {
      width: 100%;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      outline: none;
    }
    .modal-input:focus, .modal-select:focus { border-color: var(--accent); }
    .modal-select { -webkit-appearance: none; appearance: none; }

    .swings-editor { margin-bottom: 4px; }
    .swings-editor-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .swing-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .swing-row-label {
      flex: 1;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      outline: none;
    }
    .swing-row-carry {
      width: 84px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--accent);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      outline: none;
      text-align: center;
      -webkit-appearance: none;
    }
    .swing-row-label:focus, .swing-row-carry:focus { border-color: var(--accent); }

    .set-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .set-chip {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
    }
    .set-chip:active { border-color: var(--accent); color: var(--accent); }

    .swing-remove-btn {
      font-family: var(--font);
      font-size: 18px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      flex-shrink: 0;
    }
    .swing-remove-btn:active { color: var(--danger); }

    .add-swing-btn {
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: none;
      border: 1px dashed var(--dim);
      border-radius: var(--r);
      padding: 10px 14px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      margin-bottom: 4px;
    }
    .add-swing-btn:active { border-color: var(--accent); color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }
    .modal-cancel {
      flex: 1;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      cursor: pointer;
    }
    .modal-save {
      flex: 2;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: var(--r);
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .modal-save:active { opacity: 0.85; }
    .modal-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .modal-delete {
      font-family: var(--font);
      font-size: 10px;
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 18px;
      width: 100%;
      padding: 6px;
    }
    .modal-delete:active { opacity: 0.7; }

    /* ── BAGS TAB ───────────────────────────────── */
    #panel-bags {
      padding: 20px 20px calc(80px + env(safe-area-inset-bottom, 0px));
    }
    .bag-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }
    .bag-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bag-card.active-bag { border-color: var(--accent); }
    .bag-card-left { display: flex; flex-direction: column; gap: 4px; }

    .bag-card-meta { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
    .bag-active-pill {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 3px 8px;
      border-radius: 3px;
      margin-left: 10px;
    }
    .bag-edit-btn {
      font-family: var(--font);
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.08em;
      padding: 6px 4px;
    }
    .bag-edit-btn:active { color: var(--accent); }

    /* bag selector row on On Course */
    .bag-selector-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .bag-selector-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .bag-selector-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 7px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bag-selector-btn:active { border-color: var(--accent); }
    .bag-selector-arrow { font-size: 9px; color: var(--muted); }

    /* club checklist inside bag edit modal */
    .club-check-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
      max-height: 45svh;
      overflow-y: auto;
    }
    .club-check-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      user-select: none;
    }
    .club-check-item.checked { border-color: var(--accent); }
    .club-check-box {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--bg);
    }
    .club-check-item.checked .club-check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .club-check-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .club-check-type {
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-left: auto;
    }
    .bag-count-note {
      font-size: 10px;
      color: var(--muted);

      text-align: right;

    /* bag picker sheet */
    .picker-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .picker-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);

    .picker-item:active { border-color: var(--accent); }
    .picker-item.selected { border-color: var(--accent); color: var(--accent); }
    .picker-item-meta { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: 0.06em; }

    /* ── NOTES TAB ──────────────────────────────── */
    #panel-notes {
      padding: 20px 20px calc(80px + env(safe-area-inset-bottom, 0px));
      gap: 20px;
    }
    .note-textarea {
      width: 100%;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      outline: none;
      resize: none;
      min-height: 100px;
      line-height: 1.6;
    }
    .note-textarea:focus { border-color: var(--accent); }
    .note-textarea::placeholder { color: var(--muted); }
    .save-note-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--r);
      padding: 14px;
      cursor: pointer;
      width: 100%;
    }
    .save-note-btn:active { opacity: 0.85; }
    .save-note-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .notes-list-hd {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .note-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;

      line-height: 1;

    .note-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;

    /* ── NOTES PREVIEW (On Course) ─────────────── */
    .notes-preview {
      margin-top: 28px;
      padding-top: 20px;

    .notes-preview-hd {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;

      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;

    .notes-preview-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;

    /* ── SHOT FEEDBACK ──────────────────────────── */
    .feedback-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .feedback-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .feedback-btns {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .feedback-btn {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 0;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      flex: 1;

    .feedback-btn.good:active  { border-color: var(--accent); color: var(--accent); }
    .feedback-btn.long:active  { border-color: #FF9F0A; color: #FF9F0A; }

      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-align: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);

      font-size: 8px;
      letter-spacing: 0.08em;
      margin-top: 3px;
    }
    .swing-flag.long  { color: #FF9F0A; }
    .swing-flag.short { color: var(--muted); }
  </style>
</head>
<body>

<!-- ── AUTH ──────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-mark">Caddy</div>
  <div class="auth-sub">yardage tracker</div>
  <form class="auth-form" onsubmit="handleAuth(event)">
    <div>
      <label class="auth-label" for="auth-email">Email</label>
      <input class="auth-input" id="auth-email" type="email"
        autocomplete="email" autocapitalize="none" spellcheck="false" />
    </div>
    <div>
      <label class="auth-label" for="auth-password">Password</label>
      <input class="auth-input" id="auth-password" type="password"
        autocomplete="current-password" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" type="submit">Sign In</button>
  </form>
</div>

<!-- ── APP ───────────────────────────────────── -->
<div id="app">

  <div class="app-header">
    <div class="app-mark">Caddy</div>
    <button class="signout-btn" onclick="signOut()">sign out</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab-oncourse" onclick="switchTab('oncourse')">On Course</button>
<button class="tab" id="tab-yardages" onclick="switchTab('yardages')">Yardages</button>
    <button class="tab" id="tab-bags" onclick="switchTab('bags')">Bags</button>
    <button class="tab" id="tab-notes" onclick="switchTab('notes')">Notes</button>
  </div>

  <!-- ── ON COURSE ─────────────────────────── -->
  <div class="tab-panel active" id="panel-oncourse">

    <div class="env-section">
    <div class="env-toggle" onclick="toggleEnv()">
      <button class="env-locate-btn" id="env-locate-btn"
        onclick="getLocationTemp(); event.stopPropagation()">
        <svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 0C3.13 0 0 3.13 0 7c0 5.25 7 11 7 11s7-5.75 7-11c0-3.87-3.13-7-7-7z" fill="currentColor"/>
          <circle cx="7" cy="7" r="2.5" fill="var(--bg)"/>
        </svg>
      </button>
      <span class="env-toggle-label">Environmental</span>
      <span class="env-toggle-summary" id="env-summary"></span>
      <span class="env-chevron" id="env-chevron">▾</span>
    </div>
    <div class="env-fields" id="env-fields">
      <div class="conditions">
        <div class="cond-field">
          <label class="cond-label" for="cond-temp">Temp °F</label>
          <input class="cond-input" id="cond-temp" type="number"
            inputmode="numeric" value="70"
            oninput="saveConditions(); calcCaddy()" />
        </div>
        <div class="cond-field">
          <label class="cond-label" for="cond-elev">Elev ft</label>
          <input class="cond-input" id="cond-elev" type="number"
            inputmode="numeric" value="0"
            oninput="saveConditions(); calcCaddy()" />
        </div>
        <div class="cond-field">
          <label class="cond-label">Manual %</label>
          <div class="hurt-stepper">
            <button class="hurt-step-btn"
              onmousedown="startHurt(-1)" onmouseup="stopHurt()" onmouseleave="stopHurt()"
              ontouchstart="startHurt(-1,event)" ontouchend="stopHurt()">−</button>
            <div class="hurt-step-val" id="hurt-display">0%</div>
            <button class="hurt-step-btn"
              onmousedown="startHurt(1)" onmouseup="stopHurt()" onmouseleave="stopHurt()"
              ontouchstart="startHurt(1,event)" ontouchend="stopHurt()">+</button>
          </div>
          <input type="hidden" id="cond-hurt" value="0" />
        </div>
        <div class="cond-field">
          <label class="cond-label">Wind mph</label>
          <div class="hurt-stepper">
            <button class="hurt-step-btn"
              onmousedown="startWind(-1)" onmouseup="stopWind()" onmouseleave="stopWind()"
              ontouchstart="startWind(-1,event)" ontouchend="stopWind()">−</button>
            <div class="hurt-step-val" id="wind-display">0</div>
            <button class="hurt-step-btn"
              onmousedown="startWind(1)" onmouseup="stopWind()" onmouseleave="stopWind()"
              ontouchstart="startWind(1,event)" ontouchend="stopWind()">+</button>
          </div>
          <input type="hidden" id="cond-wind" value="0" />
        </div>
      </div>
    </div>
    </div>

    <div class="hero-label">Yardage to Pin</div>
    <div class="hero-input-wrap">
      <input
        type="number"
        id="yardage-input"
        inputmode="numeric"
        placeholder="—"
        min="1" max="400"
        oninput="calcCaddy()"
      />
      <span class="hero-unit">yds</span>
    </div>

    <div id="caddy-result">
      <div class="effective-bar">
        <span class="effective-label">Effective</span>
        <span class="effective-yds" id="eff-display">—<span class="effective-unit">yds</span></span>
        <span class="effective-adj" id="eff-adj"></span>
      </div>
      <div class="caddy-cards" id="caddy-cards"></div>
    </div>

    <div class="notes-preview" id="notes-preview"></div>

  </div>

  <!-- ── BAGS ─────────────────────────────── -->
  <div class="tab-panel" id="panel-bags">
    <div class="section-hd">
      <div class="section-title">Your Bags</div>
      <button class="add-btn" onclick="openNewBag()">+ New Bag</button>
    </div>
    <div class="bag-list" id="bag-list"></div>
  </div>

  <!-- ── NOTES ────────────────────────────── -->
  <div class="tab-panel" id="panel-notes">
    <div>
      <textarea class="note-textarea" id="note-input"
        placeholder="Swing thought, course note, range session..."></textarea>
      <button class="save-note-btn" id="save-note-btn" onclick="saveNote()">Save Note</button>
    </div>
    <div>
      <div class="notes-list-hd" style="margin-bottom:12px">Past Notes</div>
      <div id="note-list"></div>
    </div>
  </div>

  <!-- ── YARDAGES ──────────────────────────── -->
  <div class="tab-panel" id="panel-yardages">

    <div class="section-hd">
      <div class="section-title">Your Clubs</div>
      <button class="add-btn" onclick="openAddClub()">+ Add Club</button>
    </div>

    <div class="club-list" id="club-list"></div>

  </div>

</div>

<!-- ── CLUB MODAL ────────────────────────────── -->
<div class="modal-overlay" id="club-modal" onclick="modalBgClick(event)">
  <div class="modal">

    <div class="modal-title" id="modal-title">Add Club</div>

    <div class="modal-field">
      <label class="modal-label" for="modal-name">Club Name</label>
      <input class="modal-input" id="modal-name" type="text"
        placeholder="e.g. 7 Iron" autocapitalize="words" />
    </div>

    <div class="modal-field">
      <label class="modal-label" for="modal-type">Type</label>
      <select class="modal-select" id="modal-type" onchange="onTypeChange()">
        <option value="driver">Driver</option>
        <option value="wood">Wood / Fairway</option>
        <option value="hybrid">Hybrid</option>
        <option value="iron" selected>Iron</option>
        <option value="wedge">Wedge</option>
      </select>
    </div>

    <div class="modal-field" id="set-field" style="display:none">
      <label class="modal-label" for="modal-set">Set</label>
      <input class="modal-input" id="modal-set" type="text"
        placeholder="e.g. MP-58" autocapitalize="words" />
      <div class="set-chips" id="set-chips"></div>
    </div>

    <div class="swings-editor">
      <div class="swings-editor-hd">
        <label class="modal-label" style="margin:0">Swing Types</label>
      </div>
      <div id="swing-rows"></div>
      <button class="add-swing-btn" type="button" onclick="addSwingRow()">+ Add Swing Type</button>
    </div>

    <div class="modal-actions">
      <button class="modal-cancel" type="button" onclick="closeModal()">Cancel</button>
      <button class="modal-save" type="button" onclick="saveClub()" id="modal-save-btn">Save</button>
    </div>
    <button class="modal-delete" type="button" id="modal-delete-btn"
      onclick="deleteClub()" style="display:none">Delete Club</button>

  </div>
</div>

<!-- ── BAG EDIT MODAL ─────────────────────────── -->
<div class="modal-overlay" id="bag-modal" onclick="bagModalBgClick(event)">
  <div class="modal">
    <div class="modal-title" id="bag-modal-title">New Bag</div>

    <div class="modal-field">
      <label class="modal-label" for="bag-name-input">Bag Name</label>
      <input class="modal-input" id="bag-name-input" type="text"
        placeholder="e.g. Weekend Round" autocapitalize="words" />
    </div>

    <div class="modal-field">
      <label class="modal-label">Clubs in Bag</label>
      <div class="club-check-list" id="club-check-list"></div>
      <div class="bag-count-note" id="bag-count-note"></div>
    </div>

    <div class="modal-actions">
      <button class="modal-cancel" type="button" onclick="closeBagModal()">Cancel</button>
      <button class="modal-save" type="button" onclick="saveBag()" id="bag-save-btn">Save</button>
    </div>
    <button class="modal-delete" type="button" id="bag-delete-btn"

<!-- ── BAG PICKER SHEET ───────────────────────── -->
<div class="modal-overlay" id="bag-picker-modal" onclick="bagPickerBgClick(event)">
  <div class="modal">
    <div class="modal-title">Playing Bag</div>
    <div class="picker-list" id="picker-list"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://qlbcgpbfpkkumvznvejs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsYmNncGJmcGtrdW12em52ZWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Mjk1ODUsImV4cCI6MjA4ODEwNTU4NX0.BzIHuf1Anb16cmwx7cqXMwEXO3R3kuzVDNjsVWP0wVE';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
  });

  const TYPE_ORDER = ['driver', 'wood', 'hybrid', 'iron', 'wedge'];

  let clubs = [];
  let notes = [];
  let bags  = [];
  let editingClubId  = null;
  let editingBagId   = null;
  let activeBagId    = localStorage.getItem('caddy_active_bag') || null;
  let lastPrimary    = null;
  let feedbackLogged = false;
  let expandedClubId = null;

  /* ── SHOT LOG ──────────────────────────────── */

  function getShotLog() {
    try { return JSON.parse(localStorage.getItem('caddy_shot_log') || '[]'); }
    catch { return []; }
  }

  function addShotEntry(entry) {
    const log = getShotLog();
    log.push({ ...entry, ts: Date.now() });
    if (log.length > 500) log.splice(0, log.length - 500);
    localStorage.setItem('caddy_shot_log', JSON.stringify(log));
  }

  function getSwingFlag(clubId, swingKey) {
    const recent = getShotLog()
      .filter(e => e.clubId === clubId && e.swingKey === swingKey)
      .slice(-3);
    if (recent.length < 2) return null;
    if (recent.filter(e => e.result === 'long').length  >= 2) return 'long';
    if (recent.filter(e => e.result === 'short').length >= 2) return 'short';
    return null;
  }

  function renderFeedback() {
    const el = document.getElementById('shot-feedback');
    if (!el) return;
    if (!lastPrimary) { el.innerHTML = ''; return; }
    if (feedbackLogged) {
      el.innerHTML = `<div class="feedback-logged" onclick="event.stopPropagation()">logged ✓</div>`;
      return;
    }
    el.innerHTML = `
      <div class="feedback-row" onclick="event.stopPropagation()">
        <span class="feedback-label">Result</span>
        <div class="feedback-btns">
          <button class="feedback-btn short" onclick="logShotResult('short')">Short</button>
          <button class="feedback-btn good"  onclick="logShotResult('good')">Good</button>
          <button class="feedback-btn long"  onclick="logShotResult('long')">Long</button>
        </div>
      </div>`;
  }

  function logShotResult(result) {
    if (!lastPrimary) return;
    addShotEntry({
      clubId:        lastPrimary.clubId,
      swingKey:      lastPrimary.swingKey,
      targetYardage: parseFloat(document.getElementById('yardage-input').value),
      result
    });
    feedbackLogged = true;
    renderFeedback();
    renderClubs();
  }

  /* ── AUTH ──────────────────────────────── */

  async function init() {
    loadConditions();
    const { data: { session } } = await sb.auth.getSession();
    if (session) showApp();
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && document.getElementById('auth-screen').classList.contains('hidden') === false) {
        showApp();
      }
      if (event === 'SIGNED_OUT') {
        document.getElementById('app').classList.remove('visible');
        document.getElementById('auth-screen').classList.remove('hidden');
      }
    });
  }

  async function handleAuth(e) {
    e.preventDefault();
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Enter email and password.'; return; }
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = error.message; return; }
    showApp();
  }

  async function signOut() {
    await sb.auth.signOut();
    document.getElementById('app').classList.remove('visible');
    document.getElementById('auth-screen').classList.remove('hidden');
  }

  function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadClubs();
    setTimeout(() => document.getElementById('yardage-input').focus(), 120);
  }

  /* ── TABS ──────────────────────────────── */

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    document.getElementById(`panel-${name}`).classList.add('active');
    if (name === 'oncourse') {
      setTimeout(() => document.getElementById('yardage-input').focus(), 60);
    }

  /* ── CONDITIONS ────────────────────────── */

  function saveConditions() {
    localStorage.setItem('caddy_temp',   document.getElementById('cond-temp').value);
    localStorage.setItem('caddy_elev',   document.getElementById('cond-elev').value);
    localStorage.setItem('caddy_manual', document.getElementById('cond-hurt').value);
    localStorage.setItem('caddy_wind',   document.getElementById('cond-wind').value);
    renderEnvSummary();
    scheduleEnvClose();
  }

  function loadConditions() {
    const t = localStorage.getItem('caddy_temp');
    const e = localStorage.getItem('caddy_elev');
    const h = localStorage.getItem('caddy_manual');
    const w = localStorage.getItem('caddy_wind');
    if (t !== null) document.getElementById('cond-temp').value = t;
    if (e !== null) document.getElementById('cond-elev').value = e;
    if (h !== null) { document.getElementById('cond-hurt').value = h; renderHurt(parseInt(h)); }
    if (w !== null) { document.getElementById('cond-wind').value = w; renderWind(parseInt(w)); }
    renderEnvSummary();
  }

  function getLocationTemp() {
    if (!navigator.geolocation) return;
    const btn = document.getElementById('env-locate-btn');
    btn.classList.add('loading');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        try {
          const { latitude: lat, longitude: lon } = pos.coords;
          const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&temperature_unit=fahrenheit&forecast_days=1`);
          const data = await res.json();
          const temp = Math.round(data.current.temperature_2m);
          document.getElementById('cond-temp').value = temp;
          saveConditions();
          calcCaddy();
        } catch(e) {}
        btn.classList.remove('loading');
      },
      () => btn.classList.remove('loading'),
      { timeout: 8000 }
    );
  }

  function renderEnvSummary() {
    const temp = parseFloat(document.getElementById('cond-temp').value) || 70;
    const elev = parseFloat(document.getElementById('cond-elev').value) || 0;
    const hurt = parseInt(document.getElementById('cond-hurt').value) || 0;
    const wind = parseInt(document.getElementById('cond-wind').value) || 0;
    const parts = [];
    if (temp !== 70) parts.push(temp + '°F');
    if (elev !== 0) parts.push((elev > 0 ? '+' : '') + elev + 'ft');
    if (hurt !== 0) parts.push((hurt > 0 ? '+' : '') + hurt + '%');
    if (wind !== 0) parts.push((wind > 0 ? '+' : '') + wind + 'mph');
    document.getElementById('env-summary').textContent = parts.join(' · ');
  }

  let envCloseTimer = null;
  function scheduleEnvClose() {
    clearTimeout(envCloseTimer);
    envCloseTimer = setTimeout(() => {
      const fields  = document.getElementById('env-fields');
      const chevron = document.getElementById('env-chevron');
      fields.classList.remove('open');
      chevron.classList.remove('open');
    }, 2000);
  }

  function toggleEnv() {
    clearTimeout(envCloseTimer);
    const fields  = document.getElementById('env-fields');
    const chevron = document.getElementById('env-chevron');
    const open = fields.classList.toggle('open');
    chevron.classList.toggle('open', open);
  }

  let hurtTimer = null;

  function renderHurt(val) {
    const el = document.getElementById('hurt-display');
    el.textContent = (val > 0 ? '+' : '') + val + '%';
    el.className   = 'hurt-step-val' + (val !== 0 ? ' active' : '');
  }

  function changeHurt(dir) {
    const cur = parseInt(document.getElementById('cond-hurt').value) || 0;
    const val = Math.max(-20, Math.min(20, cur + dir));
    document.getElementById('cond-hurt').value = val;
    renderHurt(val);
    saveConditions();
    calcCaddy();
  }

  function startHurt(dir, e) {
    if (e) e.preventDefault();
    changeHurt(dir);
    hurtTimer = setInterval(() => changeHurt(dir), 140);

  function stopHurt() {
    clearInterval(hurtTimer);
    hurtTimer = null;
  }

  let windTimer = null;

  function renderWind(val) {
    const el = document.getElementById('wind-display');
    el.textContent = (val > 0 ? '+' : '') + val;
    el.className   = 'hurt-step-val' + (val !== 0 ? ' active' : '');
  }

  function changeWind(dir) {
    const cur = parseInt(document.getElementById('cond-wind').value) || 0;
    const val = Math.max(-40, Math.min(40, cur + dir));
    document.getElementById('cond-wind').value = val;
    renderWind(val);
    saveConditions();
    calcCaddy();
  }

  function startWind(dir, e) {
    if (e) e.preventDefault();
    changeWind(dir);
    windTimer = setInterval(() => changeWind(dir), 140);
  }

  function stopWind() {
    clearInterval(windTimer);
    windTimer = null;
  }

  /* ── CADDY LOGIC ───────────────────────── */

  function calcCaddy() {
    const target = parseFloat(document.getElementById('yardage-input').value);
    const temp   = parseFloat(document.getElementById('cond-temp').value) || 70;
    const elev   = parseFloat(document.getElementById('cond-elev').value) || 0;
    const hurt   = parseFloat(document.getElementById('cond-hurt').value) || 0;
    const wind   = parseFloat(document.getElementById('cond-wind').value) || 0;
    const result = document.getElementById('caddy-result');

    if (!target || target <= 0) {
      result.style.display = 'none';
      lastPrimary = null;
      feedbackLogged = false;
      expandedClubId = null;
      document.getElementById('shot-feedback').innerHTML = '';
      return;
    }

    // Effective yardage adjustments
    // Elevation: high altitude = ball flies farther = need less club = lower effective yardage (~1.15% per 1000 ft)
    // Temp: cold air is denser = shorter shots = higher effective yardage (~1 yd per 10°F below 70)
    // Headwind (+mph): +1% per mph — headwinds hurt more than tailwinds help
    // Tailwind (-mph): -0.5% per mph
    const elevAdj = -Math.round(target * elev * 1.15 / 100000);
    const tempAdj = (70 - temp) / 10;
    const hurtAdj = Math.round(target * (-hurt / 100));
    const windAdj = wind > 0
      ? Math.round(target * wind / 100)
      : Math.round(target * wind / 200);
    const effective = Math.round(target + elevAdj + tempAdj + hurtAdj + windAdj);
    const totalAdj  = Math.round(elevAdj + tempAdj + hurtAdj + windAdj);

    document.getElementById('eff-display').innerHTML =
      `${effective}<span class="effective-unit">yds</span>`;
    document.getElementById('eff-adj').textContent =
      totalAdj !== 0 ? `(${totalAdj > 0 ? '+' : ''}${totalAdj} adj)` : '';

    // Build candidate pool — filtered to active bag if one is selected
    const bag         = activeBag();
    const bagClubSet  = bag ? new Set(bag.data.clubIds || []) : null;
    const candidates  = [];
    clubs.forEach(club => {
      if (bagClubSet && !bagClubSet.has(club.id)) return;
      Object.entries(club.data.swings || {}).forEach(([key, swing]) => {
        if (swing.carry > 0 && !isHardSwing(club.id, key, swing.carry)) {
          candidates.push({
            clubId:   club.id,
            clubName: club.data.name,
            clubType: club.data.type,
            swingKey: key,
            carry:    swing.carry,
            diff:     swing.carry - effective
          });
        }
      });
    });

    const cards = document.getElementById('caddy-cards');

    if (!candidates.length) {
      result.style.display = 'block';
      cards.innerHTML = `<div class="no-clubs-prompt">
        No yardages logged yet.<br>Add your clubs in the Yardages tab.
      </div>`;
      return;
    }

    // Primary: closest carry to effective yardage (full or partial)
    const byDiff = [...candidates].sort((a, b) => Math.abs(a.diff) - Math.abs(b.diff));
    const primary = byDiff[0];

    // Alt: closest overall from a different club
    const alt = byDiff.find(c => c.clubId !== primary.clubId) || null;

    const primaryHint = findApproachHint(target - primary.carry);
    const altHint     = alt ? findApproachHint(target - alt.carry) : null;
    cards.innerHTML = caddyCardHTML(primary, true, primaryHint, effective) + (alt ? caddyCardHTML(alt, false, altHint, effective) : '');
    result.style.display = 'block';
    lastPrimary = primary;
    feedbackLogged = false;
    renderFeedback();
  }


  function toggleCardExpand(clubId) {
    expandedClubId = expandedClubId === clubId ? null : clubId;
    calcCaddy();
  }

  function caddyCardHTML(c, isPrimary, hint, effective) {
    const diff     = Math.round(c.diff);
    const diffAbs  = Math.abs(diff);
    let diffLabel, diffClass;

    if (diffAbs <= 2) {
      diffLabel = 'dead on';
      diffClass = 'exact';
    } else if (diff > 0) {
      diffLabel = `+${diff} long`;
      diffClass = 'long';
    } else {
      diffLabel = `${diff} short`;
      diffClass = 'short';
    }

    let approachHtml = '';
    if (hint) {
      const qualClass = (hint.isFull && hint.diff <= 5) ? 'full' : 'close';
      approachHtml = `<div class="card-approach ${qualClass}">
        leaves ${hint.remaining} yds → ${hint.clubDisplay} ${formatSwing(hint.swingKey)}
      </div>`;
    }

    const isExpanded = expandedClubId === c.clubId;
    let swingListHtml = '';
    if (isExpanded) {
      const club = clubs.find(cl => cl.id === c.clubId);
      if (club) {
        const entries = Object.entries(club.data.swings || {})
          .filter(([, sw]) => sw.carry > 0)
          .sort(([, a], [, b]) => (a.carry || 0) - (b.carry || 0));
        const clubFullCarry = club.data.swings?.['full']?.carry || 0;
        swingListHtml = `<div class="swing-options-list">` +
          entries.map(([key, sw]) => {
            const d    = Math.round(sw.carry - effective);
            const dAbs = Math.abs(d);
            const dClass = dAbs <= 2 ? 'exact' : d > 0 ? 'long' : 'short';
            const dLabel = dAbs <= 2 ? 'dead' : d > 0 ? `+${d}` : `${d}`;
            const isHard = clubFullCarry > 0 && sw.carry > clubFullCarry;
            const carryClass = key === 'full' ? 'carry-full' : isHard ? 'carry-hard' : 'carry-partial';
            return `<div class="swing-option${key === c.swingKey ? ' current' : ''}">
              <span class="swing-opt-label">${formatSwing(key)}</span>
              <span class="swing-opt-carry ${carryClass}">${sw.carry}</span>
              <span class="swing-opt-diff ${dClass}">${dLabel}</span>
            </div>`;
          }).join('') +
          `</div>`;
      }
    }

    return `
      <div class="caddy-card ${isPrimary ? 'commit' : 'alt'}" onclick="toggleCardExpand('${c.clubId}')">
        <div class="card-badge">${isPrimary ? 'commit' : 'consider'}</div>
        <div class="card-main">
          <div class="card-club">${displayName(c.clubName, c.clubType)}</div>
          <div class="card-carry">${c.carry}</div>
        </div>
        <div class="card-sub">
          <div class="card-swing">${formatSwing(c.swingKey)}</div>
          <div class="card-diff ${diffClass}">${diffLabel}</div>
        </div>
        ${swingListHtml}
        ${approachHtml}
        ${isPrimary ? '<div id="shot-feedback"></div>' : ''}
        <div class="card-expand-toggle">${isExpanded ? '▲ less' : '▼ all swings'}</div>
      </div>`;
  }

  function findApproachHint(remaining) {
    if (remaining < 30) return null;
    const bag        = activeBag();
    const bagClubSet = bag ? new Set(bag.data.clubIds || []) : null;
    const candidates = [];
    clubs.forEach(club => {
      if (bagClubSet && !bagClubSet.has(club.id)) return;
      Object.entries(club.data.swings || {}).forEach(([key, swing]) => {
        if (swing.carry > 0 && !isHardSwing(club.id, key, swing.carry)) candidates.push({
          clubName: club.data.name, clubType: club.data.type,
          swingKey: key, carry: swing.carry,
          isFull: key === 'full',
          diff: Math.abs(swing.carry - remaining)
        });
      });
    });
    if (!candidates.length) return null;
    candidates.sort((a, b) => {
      if (Math.abs(a.diff - b.diff) <= 3) return (b.isFull ? 1 : 0) - (a.isFull ? 1 : 0);
      return a.diff - b.diff;
    });
    const best = candidates[0];
    return { ...best, remaining, clubDisplay: displayName(best.clubName, best.clubType) };
  }

  function displayName(name, type) {
    if (!type || name.toLowerCase().includes(type.toLowerCase())) return name;
    return `${name} ${type.charAt(0).toUpperCase() + type.slice(1)}`;
  }

  function formatSwing(key) {
    const labels = {
      'full': 'Full',
      '3-4': '3/4', '3/4': '3/4', '¾': '3/4', '.75': '3/4',
      '1-2': '1/2', '1/2': '1/2', '½': '1/2', '.50': '1/2', '.5': '1/2',
      '1-4': '1/4', '1/4': '1/4', '¼': '1/4', '.25': '1/4',
    };
    return labels[key] || key;
  }

  function isHardSwing(clubId, swingKey, carry) {
    const club = clubs.find(c => c.id === clubId);
    const fullCarry = club?.data?.swings?.['full']?.carry;
    return fullCarry > 0 && carry > fullCarry;
  }

  /* ── CLUBS ─────────────────────────────── */

  async function loadClubs() {
    const { data, error } = await sb.from('yardages').select('*');
    if (error) { console.error('loadClubs:', error); return; }
    const all = data || [];
    clubs = all.filter(r => !r.id.startsWith('note_') && !r.id.startsWith('bag_'));
    notes = all.filter(r => r.id.startsWith('note_'))
               .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    bags  = all.filter(r => r.id.startsWith('bag_'));
    // validate active bag still exists
    if (activeBagId && !bags.find(b => b.id === activeBagId)) {
      activeBagId = null;
      localStorage.removeItem('caddy_active_bag');
    }
    renderClubs();
    renderNotes();
    renderBags();
    renderBagSelector();
    calcCaddy();
  }

  /* ── BAGS ──────────────────────────────────── */

  function activeBag() {
    return activeBagId ? bags.find(b => b.id === activeBagId) : null;
  }

  function setActiveBag(id) {
    activeBagId = id;
    if (id) localStorage.setItem('caddy_active_bag', id);
    else localStorage.removeItem('caddy_active_bag');
    renderBagSelector();
    renderBags();
    calcCaddy();
  }

  function renderBagSelector() {
    const el = document.getElementById('bag-selector-name');
    if (!el) return;
    const bag = activeBag();
    el.textContent = bag ? bag.data.name : 'All Clubs';
  }

  function renderBags() {
    const list = document.getElementById('bag-list');
    if (!list) return;
    if (!bags.length) {
      list.innerHTML = `<div class="empty-state">
        No bags yet.<br>
        Tap <strong style="color:var(--accent)">+ New Bag</strong> to get started.
      </div>`;
      return;
    }
    list.innerHTML = '';
    bags.forEach(bag => {
      const ids     = bag.data.clubIds || [];
      const count   = ids.length;
      const isActive = bag.id === activeBagId;
      const card = document.createElement('div');
      card.className = `bag-card${isActive ? ' active-bag' : ''}`;
      card.innerHTML = `
        <div class="bag-card-left">
          <div class="bag-card-name">
            ${bag.data.name}
            ${isActive ? '<span class="bag-active-pill">active</span>' : ''}
          </div>
          <div class="bag-card-meta">${count} club${count !== 1 ? 's' : ''}</div>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          ${!isActive ? `<button class="bag-edit-btn" style="color:var(--accent)" onclick="setActiveBag('${bag.id}')">use</button>` : `<button class="bag-edit-btn" onclick="setActiveBag(null)">deselect</button>`}
          <button class="bag-edit-btn" onclick="openEditBag('${bag.id}')">edit</button>
        </div>`;
      list.appendChild(card);
    });
  }

  function openBagPicker() {
    const pickerList = document.getElementById('picker-list');
    const items = [{ id: null, name: 'All Clubs', meta: `${clubs.length} clubs` }]
      .concat(bags.map(b => ({
        id:   b.id,
        name: b.data.name,
        meta: `${(b.data.clubIds || []).length} clubs`
      })));
    pickerList.innerHTML = items.map(item => `
      <div class="picker-item${item.id === activeBagId ? ' selected' : ''}"
        onclick="selectFromPicker(${item.id ? `'${item.id}'` : 'null'})">
        ${item.name}
        <span class="picker-item-meta">${item.meta}</span>
      </div>`).join('');
    document.getElementById('bag-picker-modal').classList.add('open');
  }

  function selectFromPicker(id) {
    setActiveBag(id);
    document.getElementById('bag-picker-modal').classList.remove('open');
  }

  function bagPickerBgClick(e) {
    if (e.target === document.getElementById('bag-picker-modal'))
      document.getElementById('bag-picker-modal').classList.remove('open');
  }

  function openNewBag() {
    editingBagId = null;
    document.getElementById('bag-modal-title').textContent = 'New Bag';
    document.getElementById('bag-name-input').value = '';
    document.getElementById('bag-delete-btn').style.display = 'none';
    renderClubChecklist([]);
    document.getElementById('bag-modal').classList.add('open');
    setTimeout(() => document.getElementById('bag-name-input').focus(), 60);
  }

  function openEditBag(bagId) {
    const bag = bags.find(b => b.id === bagId);
    if (!bag) return;
    editingBagId = bagId;
    document.getElementById('bag-modal-title').textContent = 'Edit Bag';
    document.getElementById('bag-name-input').value = bag.data.name;
    document.getElementById('bag-delete-btn').style.display = 'block';
    renderClubChecklist(bag.data.clubIds || []);
    document.getElementById('bag-modal').classList.add('open');
  }

  function renderClubChecklist(selectedIds) {
    const sel  = new Set(selectedIds);
    const list = document.getElementById('club-check-list');
    list.innerHTML = sortedClubs().map(club => `
      <div class="club-check-item${sel.has(club.id) ? ' checked' : ''}"
        data-club-id="${club.id}"
        onclick="toggleClubCheck(this)">
        <div class="club-check-box">${sel.has(club.id) ? '✓' : ''}</div>
        <div class="club-check-name">${club.data.set ? `${club.data.name} ${club.data.set}` : displayName(club.data.name, club.data.type)}</div>
        <div class="club-check-type">${club.data.type}</div>
      </div>`).join('');
    updateBagCountNote();
  }

  function toggleClubCheck(el) {
    el.classList.toggle('checked');
    el.querySelector('.club-check-box').textContent = el.classList.contains('checked') ? '✓' : '';
    updateBagCountNote();
  }

  function updateBagCountNote() {
    const count = document.querySelectorAll('#club-check-list .club-check-item.checked').length;
    const note  = document.getElementById('bag-count-note');
    note.textContent = `${count} club${count !== 1 ? 's' : ''} selected${count > 14 ? ' — over 14-club limit' : ''}`;
    note.style.color = count > 14 ? 'var(--danger)' : 'var(--muted)';
  }

  function checkedClubIds() {
    return [...document.querySelectorAll('#club-check-list .club-check-item.checked')]
      .map(el => el.dataset.clubId);
  }

  function closeBagModal() {
    document.getElementById('bag-modal').classList.remove('open');
  }

  function bagModalBgClick(e) {
    if (e.target === document.getElementById('bag-modal')) closeBagModal();
  }

  async function saveBag() {
    const name     = document.getElementById('bag-name-input').value.trim();
    const clubIds  = checkedClubIds();
    if (!name) { alert('Bag name is required.'); return; }
    const saveBtn = document.getElementById('bag-save-btn');
    saveBtn.disabled = true;

    if (editingBagId) {
      const bag = bags.find(b => b.id === editingBagId);
      bag.data = { ...bag.data, name, clubIds };
      await sb.from('yardages').update({ data: bag.data }).eq('id', editingBagId);
    } else {
      const { data: { user } } = await sb.auth.getUser();
      const id  = `bag_${Date.now()}`;
      const rec = { id, data: { type: 'bag', name, clubIds }, user_id: user.id };
      const { data, error } = await sb.from('yardages').insert(rec).select().single();
      if (!error) bags.push(data);
    }

    saveBtn.disabled = false;
    closeBagModal();
    await loadClubs();
  }

  async function deleteBag() {
    if (!editingBagId) return;
    if (!confirm('Delete this bag?')) return;
    await sb.from('yardages').delete().eq('id', editingBagId);
    if (activeBagId === editingBagId) setActiveBag(null);
    bags = bags.filter(b => b.id !== editingBagId);
    closeBagModal();
    renderBags();
  }

  /* ── NOTES ─────────────────────────────── */

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderNotesPreview() {
    const el = document.getElementById('notes-preview');
    if (!el) return;
    if (!notes.length) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="notes-preview-hd">Notes</div>` +
      notes.slice(0, 5).map(n => {
        const d = new Date(n.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `<div class="notes-preview-item">
          <div class="notes-preview-date">${d}</div>
          <div class="notes-preview-text">${escapeHtml(n.data.text)}</div>
        </div>`;
      }).join('');
  }

  function renderNotes() {
    const list = document.getElementById('note-list');
    renderNotesPreview();
    if (!list) return;
    if (!notes.length) {
      list.innerHTML = `<div class="empty-state">No notes yet.<br>Add your first swing thought above.</div>`;
      return;
    }
    list.innerHTML = notes.map(n => {
      const d = new Date(n.created_at);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `
        <div class="note-item">
          <div class="note-item-hd">
            <div class="note-date">${dateStr}</div>
            <button class="note-delete-btn" onclick="deleteNote('${n.id}')">×</button>
          </div>
          <div class="note-text">${escapeHtml(n.data.text)}</div>
        </div>`;
    }).join('');
  }

  async function saveNote() {
    const text = document.getElementById('note-input').value.trim();
    if (!text) return;
    const btn = document.getElementById('save-note-btn');
    btn.disabled = true;
    const { data: { user } } = await sb.auth.getUser();
    const id  = `note_${Date.now()}`;
    const rec = { id, data: { type: 'note', text }, user_id: user.id };
    const { data, error } = await sb.from('yardages').insert(rec).select().single();
    btn.disabled = false;
    if (!error && data) {
      notes.unshift(data);
      document.getElementById('note-input').value = '';
      renderNotes();
    }
  }

  async function deleteNote(noteId) {
    if (!confirm('Delete this note?')) return;
    await sb.from('yardages').delete().eq('id', noteId);
    notes = notes.filter(n => n.id !== noteId);
    renderNotes();
  }

  function sortedClubs() {
    return [...clubs].sort((a, b) => {
      const ai = TYPE_ORDER.indexOf(a.data.type ?? '');
      const bi = TYPE_ORDER.indexOf(b.data.type ?? '');
      if (ai !== bi) return ai - bi;
      const as = a.data.set || '';
      const bs = b.data.set || '';
      if (as !== bs) return as.localeCompare(bs);
      return a.data.name.localeCompare(b.data.name);
    });
  }

  function renderClubs() {
    const list = document.getElementById('club-list');
    const sorted = sortedClubs();

    if (!sorted.length) {
      list.innerHTML = `<div class="empty-state">
        No clubs yet.<br>
        Tap <strong style="color:var(--accent)">+ Add Club</strong> to get started.
      </div>`;
      return;
    }

    list.innerHTML = '';
    sorted.forEach(club => {
      const fullCarry = club.data.swings?.['full']?.carry || 0;
      const swingCells = Object.entries(club.data.swings || {}).sort(([,a],[,b]) => (a.carry||0) - (b.carry||0)).map(([key, sw]) => {
        const flag = getSwingFlag(club.id, key);
        const flagHtml = flag
          ? `<div class="swing-flag ${flag}">${flag === 'long' ? '↑ long' : '↓ short'}</div>`
          : '';
        const isHard = fullCarry > 0 && sw.carry > fullCarry;
        const carryClass = key === 'full' ? 'carry-full' : isHard ? 'carry-hard' : 'carry-partial';
        return `
        <div class="swing-cell">
          <div class="swing-cell-label">${formatSwing(key)}</div>
          <div class="swing-cell-carry ${carryClass}"
            onclick="inlineEdit('${club.id}','${key}',this)"
          >${sw.carry || '—'}</div>
          ${flagHtml}
        </div>`;
      }).join('');

      const card = document.createElement('div');
      card.className = 'club-card';
      card.innerHTML = `
        <div class="club-card-header">
          <div class="club-name-wrap">
            <div>
              <div class="club-name">${displayName(club.data.name, club.data.type)}</div>
              ${club.data.set ? `<div class="club-set-label">${club.data.set}</div>` : ''}
            </div>
            <div class="club-type-badge">${club.data.type}</div>
          </div>
          <button class="club-edit-btn" onclick="openEditClub('${club.id}')">edit</button>
        </div>
        <div class="club-swings">${swingCells}</div>
      `;
      list.appendChild(card);
    });
  }

  /* ── INLINE EDIT ───────────────────────── */

  function inlineEdit(clubId, swingKey, el) {
    const current = el.textContent.trim();
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'swing-carry-input';
    inp.value = current === '—' ? '' : current;
    inp.inputMode = 'numeric';
    el.replaceWith(inp);
    inp.focus();
    inp.select();

    async function commit() {
      const val = parseInt(inp.value);
      const club = clubs.find(c => c.id === clubId);
      if (club && val > 0) {
        club.data.swings[swingKey].carry = val;
        await sb.from('yardages').update({ data: club.data }).eq('id', clubId);
      }
      renderClubs();
      calcCaddy();
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { inp.blur(); }
      if (e.key === 'Escape') { renderClubs(); }
    });
  }

  /* ── ADD / EDIT MODAL ──────────────────── */

  function getExistingSets() {
    const sets = new Set();
    clubs.forEach(c => {
      if (c.data.set && (c.data.type === 'iron' || c.data.type === 'wedge'))
        sets.add(c.data.set);
    });
    return [...sets].sort();
  }

  function updateSetFieldVisibility(type) {
    const field = document.getElementById('set-field');
    const show  = type === 'iron' || type === 'wedge';
    field.style.display = show ? 'block' : 'none';
    if (show) {
      const sets = getExistingSets();
      document.getElementById('set-chips').innerHTML = sets
        .map(s => `<button type="button" class="set-chip" onclick="pickSet('${escapeHtml(s)}')">${escapeHtml(s)}</button>`)
        .join('');
    }
  }

  function pickSet(value) {
    document.getElementById('modal-set').value = value;
  }

  function openAddClub() {
    editingClubId = null;
    document.getElementById('modal-title').textContent = 'Add Club';
    document.getElementById('modal-name').value = '';
    document.getElementById('modal-set').value = '';
    document.getElementById('modal-type').value = 'iron';
    document.getElementById('modal-delete-btn').style.display = 'none';
    updateSetFieldVisibility('iron');
    setDefaultSwings('iron');
    document.getElementById('club-modal').classList.add('open');
    setTimeout(() => document.getElementById('modal-name').focus(), 60);
  }

  function openEditClub(clubId) {
    const club = clubs.find(c => c.id === clubId);
    if (!club) return;
    editingClubId = clubId;
    document.getElementById('modal-title').textContent = 'Edit Club';
    document.getElementById('modal-name').value = club.data.name;
    document.getElementById('modal-type').value = club.data.type;
    document.getElementById('modal-set').value = club.data.set || '';
    document.getElementById('modal-delete-btn').style.display = 'block';
    updateSetFieldVisibility(club.data.type);
    document.getElementById('swing-rows').innerHTML = '';
    Object.entries(club.data.swings || {}).forEach(([key, sw]) => {
      addSwingRow(key, sw.carry || '');
    });
    document.getElementById('club-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('club-modal').classList.remove('open');
  }

  function modalBgClick(e) {
    if (e.target === document.getElementById('club-modal')) closeModal();
  }

  function onTypeChange() {
    const type = document.getElementById('modal-type').value;
    updateSetFieldVisibility(type);
    if (!editingClubId) setDefaultSwings(type);
  }

  function setDefaultSwings(type) {
    document.getElementById('swing-rows').innerHTML = '';
    if (type === 'wedge') {
      addSwingRow('full');
      addSwingRow('3-4');
      addSwingRow('1-2');
    } else if (type === 'driver') {
      addSwingRow('full');
    } else {
      addSwingRow('full');
      addSwingRow('3-4');
    }
  }

  function addSwingRow(label = '', carry = '') {
    const rows = document.getElementById('swing-rows');
    const row  = document.createElement('div');
    row.className = 'swing-row';
    row.innerHTML = `
      <input class="swing-row-label" type="text" value="${label}"
        placeholder="swing type" autocapitalize="none" />
      <input class="swing-row-carry" type="number" inputmode="numeric"
        value="${carry}" placeholder="yds" />
      <button class="swing-remove-btn" type="button"
        onclick="this.closest('.swing-row').remove()">×</button>
    `;
    rows.appendChild(row);
  }

  async function saveClub() {
    const name = document.getElementById('modal-name').value.trim();
    const type = document.getElementById('modal-type').value;
    const set  = (type === 'iron' || type === 'wedge')
      ? document.getElementById('modal-set').value.trim()
      : '';
    if (!name) { alert('Club name is required.'); return; }

    const swings = {};
    document.querySelectorAll('#swing-rows .swing-row').forEach(row => {
      const lbl   = row.querySelector('.swing-row-label').value.trim();
      const carry = parseInt(row.querySelector('.swing-row-carry').value) || 0;
      if (lbl) swings[lbl] = { carry, notes: '' };
    });

    const saveBtn = document.getElementById('modal-save-btn');
    saveBtn.disabled = true;

    if (editingClubId) {
      const club = clubs.find(c => c.id === editingClubId);
      club.data = { ...club.data, name, type, set, swings };
      await sb.from('yardages').update({ data: club.data }).eq('id', editingClubId);
    } else {
      const { data: { user } } = await sb.auth.getUser();
      const slug = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
      const id   = `club_${slug}_${Date.now()}`;
      const rec  = { id, data: { name, type, set, swings }, user_id: user.id };
      const { data, error } = await sb.from('yardages').insert(rec).select().single();
      if (!error) clubs.push(data);
    }

    saveBtn.disabled = false;
    closeModal();
    await loadClubs();
  }

  async function deleteClub() {
    if (!editingClubId) return;
    if (!confirm('Delete this club and all its yardages?')) return;
    await sb.from('yardages').delete().eq('id', editingClubId);
    clubs = clubs.filter(c => c.id !== editingClubId);
    closeModal();
    renderClubs();
    calcCaddy();
  }

  init();
</script>
</body>
</html>
